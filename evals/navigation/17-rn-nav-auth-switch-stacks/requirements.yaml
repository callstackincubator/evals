version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: auth-gated-routes
    description: Must render route sets based on authentication state.
  - id: single-container-conditional-graph
    description: Must keep a single navigation container while conditionally switching the inner route graph by auth state.
  - id: state-driven-navigation-architecture-17-rn-nav-auth-switch-stacks
    description: Must drive screen transitions through React Navigation route state and navigator actions instead of manually swapping screen trees with local component state for the 17-rn-nav-auth-switch-stacks eval.
  - id: auth-flow-history-isolation-17-rn-nav-auth-switch-stacks
    description: Must isolate authenticated and unauthenticated navigation histories so protected routes are not reachable after auth-state switches for the 17-rn-nav-auth-switch-stacks eval.
  - id: implementation-use-react-navigation-static-api-17-rn-nav-auth-switch-stacks
    description: Must define navigation with React Navigation static APIs and createStaticNavigation for the 17-rn-nav-auth-switch-stacks eval.
  - id: implementation-use-native-navigation-17-rn-nav-auth-switch-stacks
    description: Must implement this flow with React Navigation native navigation primitives and route contracts for the 17-rn-nav-auth-switch-stacks eval.
