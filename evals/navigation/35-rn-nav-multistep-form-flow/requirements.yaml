version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: multi-step-route-flow
    description: Must implement at least three step routes plus a summary route in stack navigation.
  - id: step-data-propagation
    description: Must render summary data from serialized step values.
  - id: implementation-static-navigation-api
    description: Must define navigators using React Navigation static object configuration and render via createStaticNavigation.
