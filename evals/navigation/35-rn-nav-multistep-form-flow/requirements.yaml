version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: multi-step-route-flow
    description: Must implement at least three step routes plus a summary route in stack navigation.
  - id: step-data-propagation
    description: Must render summary data from serialized step values.
  - id: state-driven-navigation-architecture-35-rn-nav-multistep-form-flow
    description: Must drive screen transitions through React Navigation route state and navigator actions instead of manually swapping screen trees with local component state for the 35-rn-nav-multistep-form-flow eval.
  - id: implementation-use-react-navigation-static-api-35-rn-nav-multistep-form-flow
    description: Must define navigation with React Navigation static APIs and createStaticNavigation for the 35-rn-nav-multistep-form-flow eval.
  - id: implementation-use-native-navigation-35-rn-nav-multistep-form-flow
    description: Must implement this flow with React Navigation native navigation primitives and route contracts for the 35-rn-nav-multistep-form-flow eval.
