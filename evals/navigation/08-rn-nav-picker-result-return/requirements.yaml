version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: picker-modal-flow
    description: Must include a modal picker flow that returns a selected value to the previous form screen.
  - id: deterministic-color-state
    description: Must render the selected color from deterministic form state.
  - id: serializable-picker-params
    description: Must keep picker route params JSON-serializable and avoid callback functions in params.
  - id: implementation-use-react-navigation-static-api
    description: Must define navigation with React Navigation static APIs and createStaticNavigation.
  - id: implementation-use-native-navigation
    description: Must implement this flow with React Navigation native navigation primitives and route contracts.
