version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: picker-modal-flow
    description: Must include a modal picker flow that returns a selected value to the previous form screen.
  - id: deterministic-color-state
    description: Must render the selected color from deterministic form state.
  - id: serializable-picker-params
    description: Must keep picker route params JSON-serializable and avoid callback functions in params.
  - id: state-driven-navigation-architecture-08-rn-nav-picker-result-return
    description: Must drive screen transitions through React Navigation route state and navigator actions instead of manually swapping screen trees with local component state for the 08-rn-nav-picker-result-return eval.
  - id: implementation-use-react-navigation-static-api-08-rn-nav-picker-result-return
    description: Must define navigation with React Navigation static APIs and createStaticNavigation for the 08-rn-nav-picker-result-return eval.
  - id: implementation-use-native-navigation-08-rn-nav-picker-result-return
    description: Must implement this flow with React Navigation native navigation primitives and route contracts for the 08-rn-nav-picker-result-return eval.
