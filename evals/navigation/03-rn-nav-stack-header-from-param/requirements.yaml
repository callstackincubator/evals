version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: header-title-from-route
    description: Must set the stack header title from route params on the details screen.
  - id: runtime-header-update
    description: Must configure header options in screen logic (for example via setOptions in an effect), not as a hardcoded static title.
  - id: state-driven-navigation-architecture-03-rn-nav-stack-header-from-param
    description: Must drive screen transitions through React Navigation route state and navigator actions instead of manually swapping screen trees with local component state for the 03-rn-nav-stack-header-from-param eval.
  - id: implementation-use-react-navigation-static-api-03-rn-nav-stack-header-from-param
    description: Must define navigation with React Navigation static APIs and createStaticNavigation for the 03-rn-nav-stack-header-from-param eval.
  - id: implementation-use-native-navigation-03-rn-nav-stack-header-from-param
    description: Must implement this flow with React Navigation native navigation primitives and route contracts for the 03-rn-nav-stack-header-from-param eval.
