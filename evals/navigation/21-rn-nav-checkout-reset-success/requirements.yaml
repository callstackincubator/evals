version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: checkout-history-reset
    description: Must reset navigation state after checkout completion to a deterministic post-checkout route graph.
  - id: no-back-to-checkout
    description: Must avoid leaving checkout routes in back history after success navigation.
  - id: state-driven-navigation-architecture-21-rn-nav-checkout-reset-success
    description: Must drive screen transitions through React Navigation route state and navigator actions instead of manually swapping screen trees with local component state for the 21-rn-nav-checkout-reset-success eval.
  - id: implementation-use-react-navigation-static-api-21-rn-nav-checkout-reset-success
    description: Must define navigation with React Navigation static APIs and createStaticNavigation for the 21-rn-nav-checkout-reset-success eval.
  - id: implementation-use-native-navigation-21-rn-nav-checkout-reset-success
    description: Must implement this flow with React Navigation native navigation primitives and route contracts for the 21-rn-nav-checkout-reset-success eval.
