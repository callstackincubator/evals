version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: focus-scoped-polling
    description: Must start polling only while the screen is focused.
  - id: interval-cleanup
    description: Must clean up polling interval in focus effect teardown.
  - id: implementation-static-navigation-api
    description: Must define navigators using React Navigation static object configuration and render via createStaticNavigation.
