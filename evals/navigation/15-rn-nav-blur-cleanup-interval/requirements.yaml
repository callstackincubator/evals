version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: focus-scoped-polling
    description: Must start polling only while the screen is focused.
  - id: interval-cleanup
    description: Must clean up polling interval in focus effect teardown.
  - id: state-driven-navigation-architecture-15-rn-nav-blur-cleanup-interval
    description: Must drive screen transitions through React Navigation route state and navigator actions instead of manually swapping screen trees with local component state for the 15-rn-nav-blur-cleanup-interval eval.
  - id: implementation-use-react-navigation-static-api-15-rn-nav-blur-cleanup-interval
    description: Must define navigation with React Navigation static APIs and createStaticNavigation for the 15-rn-nav-blur-cleanup-interval eval.
  - id: implementation-use-native-navigation-15-rn-nav-blur-cleanup-interval
    description: Must implement this flow with React Navigation native navigation primitives and route contracts for the 15-rn-nav-blur-cleanup-interval eval.
