version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: rapid-navigation-async-guard
    description: Must guard async updates during rapid navigation so stale responses do not mutate inactive screens.
  - id: cleanup-on-blur-unmount
    description: Must perform cleanup on blur/unmount for async operations started by route focus.
  - id: implementation-use-react-navigation-static-api
    description: Must define navigation with React Navigation static APIs and createStaticNavigation.
  - id: implementation-use-native-navigation
    description: Must implement this flow with React Navigation native navigation primitives and route contracts.
