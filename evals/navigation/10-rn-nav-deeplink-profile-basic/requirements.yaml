version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: profile-linking-config
    description: Must provide a linking configuration that maps profile/:userId to the Profile route.
  - id: deeplink-param-usage
    description: Must read userId from deep-link route params.
  - id: state-driven-navigation-architecture-10-rn-nav-deeplink-profile-basic
    description: Must drive screen transitions through React Navigation route state and navigator actions instead of manually swapping screen trees with local component state for the 10-rn-nav-deeplink-profile-basic eval.
  - id: deep-link-valid-invalid-state-separation-10-rn-nav-deeplink-profile-basic
    description: Must keep valid deep-link rendering and invalid-link fallback as separate deterministic states derived from parsed link params for the 10-rn-nav-deeplink-profile-basic eval.
  - id: implementation-use-react-navigation-static-api-10-rn-nav-deeplink-profile-basic
    description: Must define navigation with React Navigation static APIs and createStaticNavigation for the 10-rn-nav-deeplink-profile-basic eval.
  - id: implementation-use-native-navigation-10-rn-nav-deeplink-profile-basic
    description: Must implement this flow with React Navigation native navigation primitives and route contracts for the 10-rn-nav-deeplink-profile-basic eval.
