version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: profile-linking-config
    description: Must provide a linking configuration that maps profile/:userId to the Profile route.
  - id: deeplink-param-usage
    description: Must read userId from deep-link route params.
  - id: implementation-static-navigation-api
    description: Must define navigators using React Navigation static object configuration and render via createStaticNavigation.
