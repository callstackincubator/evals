version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: main-vs-modal-groups
    description: Must separate main routes from modal routes with explicit navigator groups.
  - id: predictable-modal-back-flow
    description: Must provide predictable back/dismiss behavior for modal routes without corrupting main route graph.
  - id: state-driven-navigation-architecture-48-rn-nav-main-modal-group-architecture
    description: Must drive screen transitions through React Navigation route state and navigator actions instead of manually swapping screen trees with local component state for the 48-rn-nav-main-modal-group-architecture eval.
  - id: implementation-use-react-navigation-static-api-48-rn-nav-main-modal-group-architecture
    description: Must define navigation with React Navigation static APIs and createStaticNavigation for the 48-rn-nav-main-modal-group-architecture eval.
  - id: implementation-use-native-navigation-48-rn-nav-main-modal-group-architecture
    description: Must implement this flow with React Navigation native navigation primitives and route contracts for the 48-rn-nav-main-modal-group-architecture eval.
