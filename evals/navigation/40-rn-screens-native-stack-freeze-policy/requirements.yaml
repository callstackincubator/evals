version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: screens-optimization-enabled
    description: Must configure react-native-screens optimization settings for native stack behavior.
  - id: interactive-header-preserved
    description: Must preserve usable header interactions while optimization settings are enabled.
  - id: state-driven-navigation-architecture-40-rn-screens-native-stack-freeze-policy
    description: Must drive screen transitions through React Navigation route state and navigator actions instead of manually swapping screen trees with local component state for the 40-rn-screens-native-stack-freeze-policy eval.
  - id: implementation-use-react-navigation-static-api-40-rn-screens-native-stack-freeze-policy
    description: Must define navigation with React Navigation static APIs and createStaticNavigation for the 40-rn-screens-native-stack-freeze-policy eval.
  - id: implementation-use-native-navigation-40-rn-screens-native-stack-freeze-policy
    description: Must implement this flow with React Navigation native navigation primitives and route contracts for the 40-rn-screens-native-stack-freeze-policy eval.
