version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: screens-optimization-enabled
    description: Must configure react-native-screens optimization settings for native stack behavior.
  - id: interactive-header-preserved
    description: Must preserve usable header interactions while optimization settings are enabled.
  - id: implementation-use-react-navigation-static-api
    description: Must define navigation with React Navigation static APIs and createStaticNavigation.
  - id: implementation-use-native-navigation
    description: Must implement this flow with React Navigation native navigation primitives and route contracts.
