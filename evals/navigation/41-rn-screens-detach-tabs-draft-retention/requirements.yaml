version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: detach-inactive-tab-config
    description: Must enable inactive tab detaching behavior through tab or screen configuration.
  - id: draft-state-outside-detached-instance
    description: Must persist draft state outside detached screen instance so returning to tab restores draft content.
  - id: state-driven-navigation-architecture-41-rn-screens-detach-tabs-draft-retention
    description: Must drive screen transitions through React Navigation route state and navigator actions instead of manually swapping screen trees with local component state for the 41-rn-screens-detach-tabs-draft-retention eval.
  - id: implementation-use-react-navigation-static-api-41-rn-screens-detach-tabs-draft-retention
    description: Must define navigation with React Navigation static APIs and createStaticNavigation for the 41-rn-screens-detach-tabs-draft-retention eval.
  - id: implementation-use-native-navigation-41-rn-screens-detach-tabs-draft-retention
    description: Must implement this flow with React Navigation native navigation primitives and route contracts for the 41-rn-screens-detach-tabs-draft-retention eval.
