version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: double-back-window
    description: Must require two back presses within a deterministic time window before exiting from root.
  - id: root-only-handler
    description: Must scope this behavior to root navigation context rather than all screens.
  - id: state-driven-navigation-architecture-30-rn-nav-root-double-back-exit
    description: Must drive screen transitions through React Navigation route state and navigator actions instead of manually swapping screen trees with local component state for the 30-rn-nav-root-double-back-exit eval.
  - id: back-behavior-scoped-to-active-route-30-rn-nav-root-double-back-exit
    description: Must scope back handling to the active navigator route so back behavior remains deterministic across nested stacks for the 30-rn-nav-root-double-back-exit eval.
  - id: implementation-use-react-navigation-static-api-30-rn-nav-root-double-back-exit
    description: Must define navigation with React Navigation static APIs and createStaticNavigation for the 30-rn-nav-root-double-back-exit eval.
  - id: implementation-use-native-navigation-30-rn-nav-root-double-back-exit
    description: Must implement this flow with React Navigation native navigation primitives and route contracts for the 30-rn-nav-root-double-back-exit eval.
