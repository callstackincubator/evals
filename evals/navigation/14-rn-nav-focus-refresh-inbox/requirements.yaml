version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: focus-triggered-refresh
    description: Must trigger inbox refresh from focus lifecycle rather than only from mount lifecycle.
  - id: focus-effect-structure
    description: Must implement focus logic using useFocusEffect with callback structure suitable for cleanup.
  - id: state-driven-navigation-architecture-14-rn-nav-focus-refresh-inbox
    description: Must drive screen transitions through React Navigation route state and navigator actions instead of manually swapping screen trees with local component state for the 14-rn-nav-focus-refresh-inbox eval.
  - id: implementation-use-react-navigation-static-api-14-rn-nav-focus-refresh-inbox
    description: Must define navigation with React Navigation static APIs and createStaticNavigation for the 14-rn-nav-focus-refresh-inbox eval.
  - id: implementation-use-native-navigation-14-rn-nav-focus-refresh-inbox
    description: Must implement this flow with React Navigation native navigation primitives and route contracts for the 14-rn-nav-focus-refresh-inbox eval.
