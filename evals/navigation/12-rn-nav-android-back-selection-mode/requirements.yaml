version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: android-back-selection-priority
    description: Must consume Android back presses to disable selection mode before allowing route pop.
  - id: scoped-backhandler-cleanup
    description: Must clean up BackHandler listeners when the screen blurs.
  - id: state-driven-navigation-architecture-12-rn-nav-android-back-selection-mode
    description: Must drive screen transitions through React Navigation route state and navigator actions instead of manually swapping screen trees with local component state for the 12-rn-nav-android-back-selection-mode eval.
  - id: back-behavior-scoped-to-active-route-12-rn-nav-android-back-selection-mode
    description: Must scope back handling to the active navigator route so back behavior remains deterministic across nested stacks for the 12-rn-nav-android-back-selection-mode eval.
  - id: implementation-use-react-navigation-static-api-12-rn-nav-android-back-selection-mode
    description: Must define navigation with React Navigation static APIs and createStaticNavigation for the 12-rn-nav-android-back-selection-mode eval.
  - id: implementation-use-native-navigation-12-rn-nav-android-back-selection-mode
    description: Must implement this flow with React Navigation native navigation primitives and route contracts for the 12-rn-nav-android-back-selection-mode eval.
