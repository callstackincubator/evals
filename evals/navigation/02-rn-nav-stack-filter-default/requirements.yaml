version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: optional-filter-param
    description: Must model filter as an optional navigation param for the notifications route.
  - id: default-filter-all
    description: Must default filter to all when the param is absent.
  - id: render-filter-value
    description: Must render the normalized filter value in the screen UI.
  - id: implementation-use-react-navigation-static-api
    description: Must define navigation with React Navigation static APIs and createStaticNavigation.
  - id: implementation-use-native-navigation
    description: Must implement this flow with React Navigation native navigation primitives and route contracts.
