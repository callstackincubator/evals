version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: optional-filter-param
    description: Must model filter as an optional navigation param for the notifications route.
  - id: default-filter-all
    description: Must default filter to all when the param is absent.
  - id: render-filter-value
    description: Must render the normalized filter value in the screen UI.
  - id: state-driven-navigation-architecture-02-rn-nav-stack-filter-default
    description: Must drive screen transitions through React Navigation route state and navigator actions instead of manually swapping screen trees with local component state for the 02-rn-nav-stack-filter-default eval.
  - id: implementation-use-react-navigation-static-api-02-rn-nav-stack-filter-default
    description: Must define navigation with React Navigation static APIs and createStaticNavigation for the 02-rn-nav-stack-filter-default eval.
  - id: implementation-use-native-navigation-02-rn-nav-stack-filter-default
    description: Must implement this flow with React Navigation native navigation primitives and route contracts for the 02-rn-nav-stack-filter-default eval.
