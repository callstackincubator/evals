version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: platform-back-parity
    description: Must implement equivalent user-visible outcomes across iOS gesture back and Android hardware back in the targeted flow.
  - id: state-consistency-after-back
    description: Must keep navigation and screen state consistent after each platform-specific back interaction.
  - id: state-driven-navigation-architecture-46-rn-nav-gesture-back-parity
    description: Must drive screen transitions through React Navigation route state and navigator actions instead of manually swapping screen trees with local component state for the 46-rn-nav-gesture-back-parity eval.
  - id: back-behavior-scoped-to-active-route-46-rn-nav-gesture-back-parity
    description: Must scope back handling to the active navigator route so back behavior remains deterministic across nested stacks for the 46-rn-nav-gesture-back-parity eval.
  - id: implementation-use-react-navigation-static-api-46-rn-nav-gesture-back-parity
    description: Must define navigation with React Navigation static APIs and createStaticNavigation for the 46-rn-nav-gesture-back-parity eval.
  - id: implementation-use-native-navigation-46-rn-nav-gesture-back-parity
    description: Must implement this flow with React Navigation native navigation primitives and route contracts for the 46-rn-nav-gesture-back-parity eval.
