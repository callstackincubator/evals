version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: stack-product-details-route
    description: Must define a native stack flow where the list screen navigates to a product details screen with a productId param.
  - id: details-title-param
    description: Must pass a title param when navigating from list to product details.
  - id: typed-details-route-contract
    description: Must define a typed route-param contract where title is required and productId is optional for ProductDetails.
  - id: valid-product-route-renders-current-params
    description: Must render ProductDetails from current route params on valid navigation instead of relying on stale or global state.
  - id: product-id-fallback
    description: Must handle missing productId with a deterministic fallback display instead of showing stale or undefined values.
  - id: implementation-use-static-navigator
    description: Must use createNativeStackNavigator to define the stack navigator with at least 2 screens defined.
  - id: implementation-use-create-static-navigation
    description: Must use createStaticNavigation to define the navigation wrapper component.
  - id: implementation-use-use-navigation
    description: Must use useNavigation to get the navigation object.
  - id: implementation-use-native-navigation
    description: Must implement this flow with React Navigation native navigation primitives and route contracts.
