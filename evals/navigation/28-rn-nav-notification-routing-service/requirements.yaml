version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: payload-to-route-mapping
    description: Must map each notification payload type to one deterministic navigation destination.
  - id: nested-route-targeting
    description: Must support routing payloads into nested navigators using explicit screen/params contracts.
  - id: navigation-ref-ready-guard
    description: Must dispatch notification navigation through a root navigation reference only after readiness is confirmed.
  - id: implementation-static-navigation-api
    description: Must define navigators using React Navigation static object configuration and render via createStaticNavigation.
  - id: explicit-nested-navigation-contract
    description: Must target nested routes with explicit parent-child contracts (screen and params or equivalent static linking config) and MUST NOT rely on legacy navigationInChildEnabled behavior.
