version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: payload-to-route-mapping
    description: Must map each notification payload type to one deterministic navigation destination.
  - id: nested-route-targeting
    description: Must support routing payloads into nested navigators using explicit screen/params contracts.
  - id: navigation-ref-ready-guard
    description: Must dispatch notification navigation through a root navigation reference only after readiness is confirmed.
  - id: state-driven-navigation-architecture-28-rn-nav-notification-routing-service
    description: Must drive screen transitions through React Navigation route state and navigator actions instead of manually swapping screen trees with local component state for the 28-rn-nav-notification-routing-service eval.
  - id: implementation-use-react-navigation-static-api-28-rn-nav-notification-routing-service
    description: Must define navigation with React Navigation static APIs and createStaticNavigation for the 28-rn-nav-notification-routing-service eval.
  - id: implementation-use-native-navigation-28-rn-nav-notification-routing-service
    description: Must implement this flow with React Navigation native navigation primitives and route contracts for the 28-rn-nav-notification-routing-service eval.
