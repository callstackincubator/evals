version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: query-param-parsing
    description: Must parse feed query parameters from deep links.
  - id: query-default-normalization
    description: Must normalize missing or invalid query params to deterministic defaults.
  - id: implementation-static-navigation-api
    description: Must define navigators using React Navigation static object configuration and render via createStaticNavigation.
