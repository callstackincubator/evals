requirements:
  - id: onboarding-gated-routes
    description: Must conditionally render onboarding vs main routes based on onboarding completion state.
  - id: graph-switch-after-complete
    description: Must switch route graph after onboarding completion without leaving onboarding route in active flow.
  - id: state-driven-navigation-architecture-33-rn-nav-onboarding-gated-main
    description: Must drive screen transitions through React Navigation route state and navigator actions instead of manually swapping screen trees with local component state for the 33-rn-nav-onboarding-gated-main eval.
  - id: implementation-use-react-navigation-static-api-33-rn-nav-onboarding-gated-main
    description: Must define navigation with React Navigation static APIs and createStaticNavigation for the 33-rn-nav-onboarding-gated-main eval.
  - id: implementation-use-native-navigation-33-rn-nav-onboarding-gated-main
    description: Must implement this flow with React Navigation native navigation primitives and route contracts for the 33-rn-nav-onboarding-gated-main eval.
