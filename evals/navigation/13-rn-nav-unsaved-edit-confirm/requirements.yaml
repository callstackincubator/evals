version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: prevent-leave-when-dirty
    description: Must block leave actions while the form is dirty.
  - id: explicit-confirm-path
    description: Must provide an explicit user confirmation path that then continues the blocked navigation action.
  - id: implementation-use-react-navigation-static-api
    description: Must define navigation with React Navigation static APIs (object-based create*Navigator({ screens: ... })) and createStaticNavigation.
  - id: implementation-use-native-navigation
    description: Must implement this flow with React Navigation native navigation primitives and route contracts in React Native.
