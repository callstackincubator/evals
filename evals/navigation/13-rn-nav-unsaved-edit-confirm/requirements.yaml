  - id: implementation-use-react-navigation-static-api-13-rn-nav-unsaved-edit-confirm
    description: Must define navigation with React Navigation static APIs and createStaticNavigation for the 13-rn-nav-unsaved-edit-confirm eval.
  - id: implementation-use-native-navigation-13-rn-nav-unsaved-edit-confirm
    description: Must implement this flow with React Navigation native navigation primitives and route contracts for the 13-rn-nav-unsaved-edit-confirm eval.
