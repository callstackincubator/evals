version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: prevent-leave-when-dirty
    description: Must block leave actions while the form is dirty.
  - id: usepreventremove-hook
    description: Must implement dirty-form leave interception with usePreventRemove for native-stack back handling instead of relying only on beforeRemove listeners.
  - id: explicit-confirm-path
    description: Must provide an explicit user confirmation path that then continues the blocked navigation action.