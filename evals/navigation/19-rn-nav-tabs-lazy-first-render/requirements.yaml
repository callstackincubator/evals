version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: tab-lazy-loading
    description: Must enable lazy behavior for bottom tabs so non-initial tabs are not eagerly rendered.
  - id: explicit-tab-config
    description: Must include explicit tab navigator options for lazy rendering behavior.
  - id: state-driven-navigation-architecture-19-rn-nav-tabs-lazy-first-render
    description: Must drive screen transitions through React Navigation route state and navigator actions instead of manually swapping screen trees with local component state for the 19-rn-nav-tabs-lazy-first-render eval.
  - id: implementation-use-react-navigation-static-api-19-rn-nav-tabs-lazy-first-render
    description: Must define navigation with React Navigation static APIs and createStaticNavigation for the 19-rn-nav-tabs-lazy-first-render eval.
  - id: implementation-use-native-navigation-19-rn-nav-tabs-lazy-first-render
    description: Must implement this flow with React Navigation native navigation primitives and route contracts for the 19-rn-nav-tabs-lazy-first-render eval.
