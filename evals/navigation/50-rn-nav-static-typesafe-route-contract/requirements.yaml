version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: static-navigation-definition
    description: Must define navigation using React Navigation static configuration and createStaticNavigation.
  - id: typed-param-list-contract
    description: Must define a typed param list contract and include Details with required itemId params.
  - id: typed-screen-param-consumption
    description: Must consume itemId through typed route or screen props in Details screen logic.
  - id: implementation-use-react-navigation-static-api
    description: Must define navigation with React Navigation static APIs (object-based create*Navigator({ screens: ... })) and createStaticNavigation.
  - id: implementation-use-native-navigation
    description: Must implement this flow with React Navigation native navigation primitives and route contracts in React Native.
