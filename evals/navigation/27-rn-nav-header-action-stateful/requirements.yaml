version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: header-bookmark-action
    description: Must provide a stateful header action for bookmark toggling on the current route.
  - id: ui-state-sync
    description: Must synchronize visible screen UI with the bookmark state changed from header action.
  - id: state-driven-navigation-architecture-27-rn-nav-header-action-stateful
    description: Must drive screen transitions through React Navigation route state and navigator actions instead of manually swapping screen trees with local component state for the 27-rn-nav-header-action-stateful eval.
  - id: implementation-use-react-navigation-static-api-27-rn-nav-header-action-stateful
    description: Must define navigation with React Navigation static APIs and createStaticNavigation for the 27-rn-nav-header-action-stateful eval.
  - id: implementation-use-native-navigation-27-rn-nav-header-action-stateful
    description: Must implement this flow with React Navigation native navigation primitives and route contracts for the 27-rn-nav-header-action-stateful eval.
