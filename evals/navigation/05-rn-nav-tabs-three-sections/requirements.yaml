  - id: implementation-use-react-navigation-static-api-05-rn-nav-tabs-three-sections
    description: Must define navigation with React Navigation static APIs and createStaticNavigation for the 05-rn-nav-tabs-three-sections eval.
  - id: implementation-use-native-navigation-05-rn-nav-tabs-three-sections
    description: Must implement this flow with React Navigation native navigation primitives and route contracts for the 05-rn-nav-tabs-three-sections eval.
