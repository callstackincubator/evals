version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: per-tab-stack-structure
    description: Must define a stack navigator inside each tab instead of sharing one global stack for all tabs.
  - id: tab-history-preserved
    description: Must preserve independent navigation history for tab flows when switching tabs.
  - id: implementation-static-navigation-api
    description: Must define navigators using React Navigation static object configuration and render via createStaticNavigation.
  - id: implementation-nav-per-tab-nested-stack-contract
    description: Must keep each tab wired to its own nested stack contract so per-tab history remains independent without legacy navigationInChildEnabled behavior.
