version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: tabbar-hidden-on-details
    description: Must conditionally hide the bottom tab bar when a nested details route is focused.
  - id: tabbar-restored-on-back
    description: Must restore normal tab bar visibility when navigating back from details routes.
  - id: implementation-nav-nested-route-tabbar-visibility-contract
    description: Must derive tab-bar visibility from the focused nested route in the static tab-stack architecture and MUST NOT rely on legacy navigationInChildEnabled behavior.
