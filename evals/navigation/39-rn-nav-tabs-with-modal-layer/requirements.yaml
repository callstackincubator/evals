version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: modal-over-tab-architecture
    description: Must place modal routes above tab routes in navigation hierarchy.
  - id: modal-dismiss-to-tab-context
    description: Must dismiss modal back to previously active tab context.
  - id: implementation-static-navigation-api
    description: Must define navigators using React Navigation static object configuration and render via createStaticNavigation.
  - id: explicit-nested-navigation-contract
    description: Must target nested routes with explicit parent-child contracts (screen and params or equivalent static linking config) and MUST NOT rely on legacy navigationInChildEnabled behavior.
