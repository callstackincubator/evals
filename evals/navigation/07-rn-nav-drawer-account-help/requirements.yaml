version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: drawer-two-sections
    description: Must define drawer routes named Account, Help.
  - id: explicit-drawer-config
    description: Must include explicit drawer screen configuration rather than implicit placeholder routing.
