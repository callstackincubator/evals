version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: zustand-create-store-hook
    description: Store hook is created with `create` from `zustand`
  - id: request-identity-state-is-tracked
    description: Store state must include `activeRequestId`
  - id: request-identity-is-incremented-before-fetch
    description: Must write `activeRequestId` through `set` before fetch
  - id: search-request-uses-encoded-query-endpoint
    description: Search fetch uses `encodeURIComponent` for query
  - id: stale-request-guard-runs-after-async-work
    description: After async fetch, must compare `activeRequestId` with local request id and return on mismatch
