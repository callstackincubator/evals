version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: request-identity-tracking
    description: Must track request identity or version for concurrent async actions.
  - id: latest-intent-wins-commit
    description: Must commit async results only when they belong to the latest active request.
  - id: stale-response-ignored
    description: Must ignore or drop out-of-date async responses so stale data cannot overwrite newer state.
  - id: async-stale-result-guard-06-rn-zustand-request-id-stale-response-guard
    description: Must prevent stale async completions from overwriting newer state by using cancellation, request identity guards, or equivalent ordering control for the 06-rn-zustand-request-id-stale-response-guard eval.
  - id: implementation-use-zustand-06-rn-zustand-request-id-stale-response-guard
    description: Must implement state behavior using Zustand stores, actions, and selectors for the 06-rn-zustand-request-id-stale-response-guard eval.
