version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: latest-intent-ordering-guard
    description: Must guard async commits with latest-intent identity tracking so only newest request can apply results.
  - id: post-await-transition-wrap
    description: After async completion, non-urgent result state commits must be wrapped in transition scheduling.
  - id: stale-completion-suppression
    description: Must suppress stale async completions from committing over fresher UI state.
