version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: latest-intent-ordering-guard
    description: Must guard async result commits so only the latest intended transition result is applied.
  - id: post-await-transition-wrap
    description: Must apply transition APIs to non-urgent result state updates instead of treating them as urgent updates.
  - id: stale-completion-suppression
    description: Must suppress stale async completions from replacing fresher UI state.

  - id: implementation-use-react-concurrent-primitives
    description: Must implement this behavior with React concurrent primitives relevant to this task.
