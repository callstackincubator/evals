version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: mutation-success-invalidates-list
    description: Must invalidate the relevant list query key after mutation success.
  - id: targeted-invalidation-scope
    description: Must target invalidation to the affected query key family instead of broad unrelated cache resets.
  - id: post-mutation-consistency
    description: Must invalidate the same list query key family used by the rendered list so fresh server state is refetched after mutation success.
  - id: async-stale-result-guard
    description: Must prevent stale async completions from overwriting newer state by using cancellation, request identity guards, or equivalent ordering control.
  - id: mutation-commit-ordering-contract
    description: Must keep mutation commit and rollback ordering deterministic so overlapping updates cannot leave inconsistent client state.
  - id: implementation-use-react-query
    description: Must implement async state behavior using @tanstack/react-query primitives.
