version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: app-is-wrapped-with-query-client-provider
    description: App component renders `QueryClientProvider` with `client` set to `queryClient` and wraps `ItemsScreen`
  - id: items-queryfn-uses-query-function-context-signal
    description: Items `queryFn` reads `signal` from `QueryFunctionContext` and passes it to `fetchItems`
  - id: create-mutation-uses-usemutation-object-form
    description: Create flow uses `useMutation` object form with `mutationFn` set to `createItem`
  - id: create-mutation-invalidates-items-key-on-success
    description: Mutation `onSuccess` calls `reactQueryClient.invalidateQueries`
  - id: create-button-disabled-is-bound-to-mutation-pending
    description: Create button `disabled` prop uses `isPending` from mutation
