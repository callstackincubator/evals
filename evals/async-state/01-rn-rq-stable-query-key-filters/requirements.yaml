version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: stable-serializable-query-key
    description: Must define a key builder (for example `buildProductsQueryKey(filter, page, pageSize)`) that returns `['products', filter, page, pageSize] as const`.
  - id: no-unstable-query-key-members
    description: Query key entries must remain primitive/serializable (`'products'`, filter string, page number, pageSize number) with no functions or object references.
  - id: queryfn-derived-from-querykey
    description: Must destructure `activeFilter`, `activePage`, and `activePageSize` from `QueryFunctionContext<ProductsQueryKey>.queryKey`.
  - id: implementation-rq-v5-object-signature
    description: Must use TanStack Query v5 object-form APIs (`useQuery({ ... })`, client object filters), not legacy positional signatures.
  - id: implementation-rq-placeholderdata-identity
    description: Must set `placeholderData` as `(previous) => previous` to keep previous page/category data visible during refetch.
