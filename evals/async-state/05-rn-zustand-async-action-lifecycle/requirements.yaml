version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: explicit-async-lifecycle-state
    description: Must model async fetch lifecycle explicitly in store state with idle loading success and error phases.
  - id: async-action-updates-store
    description: Must implement the fetch as a Zustand async action that updates store state via set.
  - id: error-reset-or-retry-path
    description: Must provide deterministic error handling with a clear retry or reset path.

  - id: implementation-use-zustand
    description: Must implement state behavior using Zustand store/actions/selectors relevant to this task.
