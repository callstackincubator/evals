version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: urgent-input-state-separate-from-deferred
    description: Must keep text input state urgent and separate from deferred list filtering work.
  - id: use-deferred-value-for-heavy-list
    description: Must use useDeferredValue for expensive list updates derived from search input.
  - id: stale-results-indicator
    description: Must render a deterministic stale-results indicator when deferred list data lags behind current input.
  - id: async-stale-result-guard
    description: Must prevent stale async completions from overwriting newer state by using cancellation, request identity guards, or equivalent ordering control.
  - id: implementation-use-react-concurrent-primitives
    description: Must implement this behavior with React concurrent primitives.
