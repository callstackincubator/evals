version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: async-read-atom-source
    description: Must implement profile loading as an async read atom that resolves data via promise.
  - id: suspense-boundary-for-async-atom
    description: Must consume the async atom under a React Suspense boundary with an explicit fallback UI.
  - id: no-duplicate-manual-loading-flag
    description: Must avoid redundant component-level loading flags that duplicate the async atom plus Suspense contract.
  - id: async-stale-result-guard
    description: Must prevent stale async completions from overwriting newer state by using cancellation, request identity guards, or equivalent ordering control.
  - id: implementation-use-jotai
    description: Must implement state behavior using Jotai atoms and utilities.
