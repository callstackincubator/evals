version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: profile-uses-async-read-atom
    description: Profile data source is modeled as a Jotai async read atom with `atom(async () => ...)`
  - id: profile-fetch-uses-endpoint-and-status-guard
    description: Profile read atom fetches from the users endpoint
  - id: profile-consumer-reads-atom-value
    description: Profile content reads the async atom through `useAtomValue`
  - id: suspense-boundary-renders-loading-fallback
    description: Profile consumer is rendered under `Suspense` with explicit loading fallback UI
