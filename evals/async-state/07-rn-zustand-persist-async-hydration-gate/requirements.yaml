version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: zustand-persist-uses-asyncstorage-json-storage
    description: Store uses `persist` with `createJSONStorage(() => AsyncStorage)` and persists only token state
  - id: store-includes-hydration-and-profile-fields
    description: Store state includes `hasHydrated` `token` `profileStatus` `profileName` and hydration setter action
  - id: login-fetches-token-from-auth-endpoint
    description: Login action performs `POST` request to auth login endpoint and writes returned token into store
  - id: profile-request-uses-bearer-token-header
    description: Profile fetch request sends `Authorization` bearer header built from persisted token
  - id: onrehydrate-sets-hydrated-and-reloads-profile
    description: onRehydrateStorage sets hydrated flag in success and error paths and reloads profile when token exists
  - id: ui-has-pre-hydration-loading-branch
    description: UI renders hydration loading branch when `hasHydrated` is false
  - id: ui-has-profile-loading-branch-after-token
    description: UI renders profile loading branch when token exists and `profileStatus` is loading
