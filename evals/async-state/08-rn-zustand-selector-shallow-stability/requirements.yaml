version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: narrow-selector-subscriptions
    description: Must subscribe components to narrow store slices instead of selecting the full store object.
  - id: shallow-or-equivalent-equality
    description: For object-like selector outputs, must use useShallow (or equivalent stable-equality strategy) to prevent avoidable rerenders.
  - id: immutable-untouched-branch-preservation
    description: Must update store immutably while preserving references for untouched branches.
  - id: implementation-zustand-v5-named-create
    description: Must use named create import from 'zustand' (v5 style) and MUST NOT rely on removed default-export create usage.
  - id: implementation-zustand-v5-selector-equality
    description: Must NOT pass a custom equality function as the second argument to create-based hook selectors in v5; use useShallow or createWithEqualityFn when equality control is needed.
