version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: app-is-wrapped-with-query-client-provider
    description: App component renders `QueryClientProvider` with `client` set to `queryClient` and wraps `TodosScreen`
  - id: mutation-uses-object-form-with-optimistic-callbacks
    description: Toggle flow uses `useMutation` object form with `mutationFn` `onMutate` `onError` and `onSettled` callbacks
  - id: onmutate-cancels-snapshots-and-writes-optimistic-cache
    description: Must call `cancelQueries` from `onMutate`, read snapshot with `getQueryData`, and write optimistic list with `setQueryData`
  - id: onerror-restores-snapshot-context
    description: Must read snapshot from `onError` and restore it through `setQueryData`
  - id: onsettled-invalidates-todos-query-key
    description: Must call `reactQueryClient.invalidateQueries` from `onSettled`
  - id: press-handler-calls-mutate-with-todoid-and-nextdone
    description: Row press callback must trigger mutation
  - id: error-copy-is-conditional-on-mutation-error
    description: Failure text is rendered only when mutation error state is set.
