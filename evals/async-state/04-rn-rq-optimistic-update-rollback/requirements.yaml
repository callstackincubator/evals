version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: optimistic-update-with-snapshot
    description: Must implement optimistic cache update in onMutate with cancelQueries + snapshot capture + setQueryData optimistic write.
  - id: rollback-on-mutation-error
    description: Must restore pre-mutation snapshot in onError when optimistic mutation fails.
  - id: settle-path-revalidation
    description: Must revalidate affected query keys in onSettled to reconcile optimistic cache with authoritative server state.
  - id: implementation-rq-v5-object-signature
    description: Must use TanStack Query v5 object-signature APIs (for hooks and queryClient methods) and MUST NOT use legacy positional overload calls.
  - id: implementation-rq-optimistic-context-rollback-contract
    description: Must return snapshot rollback context from onMutate and consume that context in onError to deterministically restore optimistic cache state.
