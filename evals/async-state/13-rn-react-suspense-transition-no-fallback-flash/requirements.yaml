version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: non-urgent-filter-change-in-transition
    description: Must wrap non-urgent filter changes in a transition boundary using startTransition or useTransition.
  - id: previous-content-kept-during-transition
    description: Must keep previously revealed content visible during transition instead of immediately replacing with a broad fallback.
  - id: pending-indicator-for-transition
    description: Must expose transition pending state to communicate background work progress.
  - id: async-stale-result-guard
    description: Must prevent stale async completions from overwriting newer state by using cancellation, request identity guards, or equivalent ordering control.
  - id: implementation-use-react-concurrent-primitives
    description: Must implement this behavior with React concurrent primitives.
