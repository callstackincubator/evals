version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: non-urgent-filter-change-in-transition
    description: Must treat filter changes as non-urgent by scheduling them through transition APIs (startTransition/useTransition).
  - id: previous-content-kept-during-transition
    description: Must keep previously revealed content visible while next filter work resolves instead of immediate broad fallback flash.
  - id: pending-indicator-for-transition
    description: Must expose transition pending state to indicate background update progress.
