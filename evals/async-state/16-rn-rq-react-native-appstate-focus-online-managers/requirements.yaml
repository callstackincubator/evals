version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: appstate-focusmanager-integration
    description: Must use TanStack Query focusManager by mapping React Native AppState changes to focusManager.setFocused, with active state treated as focused.
  - id: connectivity-onlinemanager-integration
    description: Must use TanStack Query onlineManager by deriving online/offline from React Native connectivity signals (for example NetInfo isConnected/isInternetReachable) and updating onlineManager.setOnline on connectivity transitions.
  - id: controlled-refetch-behavior
    description: Must control refetch behavior across foreground/background and reconnect transitions through focusManager and onlineManager state changes (including duplicate-transition guards) so refetch storms are avoided; explicit QueryClient refetch default overrides are optional.
