version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: appstate-focusmanager-integration
    description: Must integrate React Native AppState events with TanStack Query focusManager semantics.
  - id: connectivity-onlinemanager-integration
    description: Must integrate connectivity state with TanStack Query onlineManager semantics.
  - id: controlled-refetch-behavior
    description: Must control refetch behavior across foreground/background and reconnect transitions through focusManager and onlineManager state changes (including duplicate-transition guards) so refetch storms are avoided; explicit QueryClient refetch default overrides are optional.
