version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: async-write-atom-mutation-action
    description: Must implement mutation side effects inside an async write atom.
  - id: pending-and-error-state-atoms
    description: Must expose deterministic pending and error state for mutation lifecycle.
  - id: success-commits-to-target-atoms
    description: Must commit successful mutation results to the target atoms in a predictable way.
