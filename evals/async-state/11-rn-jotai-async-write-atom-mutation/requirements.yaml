version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: submit-mutation-is-async-write-atom
    description: Submit flow is implemented as a writable async Jotai atom action
  - id: composer-uses-draft-posts-and-submit-state-atoms
    description: Screen state includes separate atoms for draft text posts list and submit lifecycle
  - id: submit-lifecycle-handles-pending-success-error
    description: Submit action writes pending then commits success or error lifecycle state
  - id: submit-success-commits-created-post-and-resets-draft
    description: Successful mutation appends or prepends created post data and clears draft input atom
  - id: submit-ui-dispatches-write-atom
    description: Submit button triggers the async write atom through `useSetAtom` or `useAtom` dispatch
