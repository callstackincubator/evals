version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: loadable-wrapping-for-async-atom
    description: Must wrap async atom access with a loadable pattern that exposes explicit loading, hasData, and hasError branches.
  - id: refresh-signal-recomputes-async-atom
    description: Must provide a deterministic refresh signal that recomputes the async atom without relying on Suspense resets.
  - id: explicit-non-suspense-state-branches
    description: Must render explicit non-Suspense UI branches for loading success and failure paths.
  - id: no-unhandled-promise-throw
    description: Must avoid unhandled promise throws in render when no Suspense boundary is present.
  - id: implementation-use-jotai-10-rn-jotai-loadable-async-atom-no-suspense
    description: Must implement state behavior using Jotai atoms and utilities for the 10-rn-jotai-loadable-async-atom-no-suspense eval.
