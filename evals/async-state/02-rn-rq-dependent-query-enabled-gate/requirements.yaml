version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: dependency-gated-query
    description: Must gate the dependent projects query with enabled logic so it runs only when the upstream profile id exists.
  - id: explicit-upstream-and-downstream-keys
    description: Must model upstream and dependent queries with explicit and distinct query keys.
  - id: safe-initial-dependent-state
    description: Must keep dependent-query state safe before enablement, avoiding premature network calls and invalid-id requests.
  - id: async-stale-result-guard
    description: Must prevent stale async completions from overwriting newer state by using cancellation, request identity guards, or equivalent ordering control.
  - id: query-lifecycle-cleanup-contract
    description: Must clean up lifecycle subscriptions and side effects tied to query invalidation or refetch triggers when scope changes.
  - id: implementation-use-react-query
    description: Must implement async state behavior using @tanstack/react-query primitives.
