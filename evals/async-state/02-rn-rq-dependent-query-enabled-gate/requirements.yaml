requirements:
  - id: app-is-wrapped-with-query-client-provider
    description: App component renders `QueryClientProvider` with `client` set to `queryClient` and wraps `ProjectsScreen`
  - id: profile-queryfn-uses-query-function-context-signal
    description: Profile `queryFn` reads `signal` from `QueryFunctionContext` and passes it to `fetchProfile`
  - id: projects-query-key-uses-profile-id-with-pending-fallback
    description: Projects query uses `queryKey` array `projects` and `profileId`
  - id: projects-query-enabled-uses-profile-id-boolean
    description: Projects query `enabled` option is set from boolean cast of `profileId`
  - id: projects-queryfn-destructures-userid-from-querykey
    description: Projects `queryFn` destructures `userId` from `queryKey`
