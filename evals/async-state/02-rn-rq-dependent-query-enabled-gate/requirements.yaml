version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: dependency-gated-query
    description: Must gate the dependent projects query with enabled: !!profileId so it does not execute before upstream identity exists.
  - id: explicit-upstream-and-downstream-keys
    description: Must define distinct query keys for upstream profile and downstream projects queries.
  - id: safe-initial-dependent-state
    description: Before enablement, dependent query must remain in a safe pending/idle state without invalid-id network requests.
  - id: implementation-rq-v5-object-signature
    description: Must use TanStack Query v5 object-signature APIs (for hooks and queryClient methods) and MUST NOT use legacy positional overload calls.
  - id: implementation-rq-no-query-callbacks
    description: Must NOT pass onSuccess/onError/onSettled callbacks to useQuery options (removed in v5); mutation callbacks remain allowed.
