version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: flatlist-stable-keyextractor
    description: Must provide a stable keyExtractor based on item identity, not array index.
  - id: extra-data-selection-refresh
    description: Must wire FlatList extraData (or equivalent immutable dependency path) so selected-row UI updates are deterministic.
  - id: no-item-key-anti-pattern
    description: Must avoid forcing per-row remount via unstable key usage inside renderItem output.
  - id: implementation-rn-core-keyextractor-nonindex
    description: Must provide stable keyExtractor based on logical item identity and MUST NOT use array-index keys for mutable or reorderable datasets.
