version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: flashlist-adoption
    description: Must implement the list with @shopify/flash-list FlashList.
  - id: remove-nested-key-recycling-blockers
    description: Must avoid explicit key usage patterns inside FlashList item subtrees that break recycling behavior.
  - id: mapping-helper-when-needed
    description: Must use FlashList mapping-safe strategy when rendering mapped nested children in row content.
  - id: implementation-flashlist-v2-component-migration
    description: Must use FlashList v2 component APIs and MUST NOT use deprecated MasonryFlashList component paths.
  - id: implementation-flashlist-v2-usemappinghelper-contract
    description: Must use FlashList v2 useMappingHelper/getMappingKey for mapped nested children and MUST NOT use ad-hoc nested key props that fight recycling.
