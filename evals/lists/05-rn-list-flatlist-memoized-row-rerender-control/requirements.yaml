version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: memoized-row-component
    description: Must memoize row rendering boundaries so unrelated rows are not needlessly recomputed.
  - id: stable-renderitem-reference
    description: Must avoid recreating expensive renderItem paths on every parent render.
  - id: targeted-row-update
    description: Must update row state using item identity so only intended rows change.
  - id: stable-row-identity-contract
    description: Must preserve stable row identity with deterministic keys so virtualization and row state reuse remain correct across updates.
  - id: implementation-use-flatlist
    description: Must implement list behavior using FlatList APIs.
