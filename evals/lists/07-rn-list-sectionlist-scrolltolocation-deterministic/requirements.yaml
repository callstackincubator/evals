version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: sectionlist-scrolltolocation-usage
    description: Must use SectionList scrollToLocation for programmatic section navigation.
  - id: section-target-index-resolution
    description: Must resolve section and item indexes from deterministic source data before calling scrollToLocation.
  - id: deterministic-offset-strategy
    description: Must include deterministic viewOffset/getItemLayout strategy so target rows land predictably.
  - id: invalid-target-guard
    description: Must handle missing or invalid section/item targets without crashing.
  - id: implementation-use-sectionlist-07-rn-list-sectionlist-scrolltolocation-deterministic
    description: Must implement list behavior using SectionList APIs for the 07-rn-list-sectionlist-scrolltolocation-deterministic eval.
