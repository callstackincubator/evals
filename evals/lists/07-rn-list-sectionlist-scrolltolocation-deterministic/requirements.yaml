version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: sectionlist-scrolltolocation-usage
    description: Must call scrollToLocation on a sectioned-list ref for programmatic section navigation.
  - id: deterministic-offset-strategy
    description: Must include deterministic viewOffset/getItemLayout strategy so target rows land predictably.
  - id: invalid-target-guard
    description: Must handle missing or invalid section/item targets without crashing.
  - id: implementation-rn-core-keyextractor-nonindex
    description: Must provide stable keyExtractor based on logical item identity and MUST NOT use array-index keys for mutable or reorderable datasets.
