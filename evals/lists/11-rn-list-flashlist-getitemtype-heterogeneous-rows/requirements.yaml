version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: flashlist-heterogeneous-rendering
    description: Must render heterogeneous FlashList rows with type-specific UI.
  - id: getitemtype-enabled
    description: Must provide getItemType for heterogeneous item categories.
  - id: type-safe-row-identity
    description: Must keep keys and item type mapping consistent across updates.
  - id: implementation-flashlist-v2-stable-getitemtype-contract
    description: Must return stable low-cardinality getItemType values from item identity/category and MUST NOT derive type from index.
