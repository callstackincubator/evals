version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: recycling-aware-local-state
    description: Must handle local row state in a recycling-safe way for FlashList.
  - id: reset-on-item-identity-change
    description: Must reset or rebind row-local state when recycled container receives a different logical item.
  - id: deterministic-expanded-state
    description: Must keep expanded/collapsed behavior deterministic per item identity.
  - id: stable-row-identity-contract
    description: Must preserve stable row identity with deterministic keys so virtualization and row state reuse remain correct across updates.
  - id: virtualization-tuning-contract
    description: Must provide library-specific virtualization tuning inputs such as estimated item size or item typing for deterministic rendering behavior.
  - id: implementation-use-flashlist
    description: Must implement list behavior using FlashList APIs.
