version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: recycling-aware-local-state
    description: Must handle local row state in a recycling-safe way for FlashList.
  - id: reset-on-item-identity-change
    description: Must reset or rebind row-local state when recycled container receives a different logical item.
  - id: deterministic-expanded-state
    description: Must keep expanded/collapsed behavior deterministic per item identity.
  - id: implementation-flashlist-v2-component-migration
    description: Must use FlashList v2 component APIs and MUST NOT use deprecated MasonryFlashList component paths.
  - id: implementation-flashlist-v2-userecyclingstate-contract
    description: Must use FlashList v2 recycling-aware row-state APIs (for example useRecyclingState) or equivalent id-rebind logic when recycled containers switch items.
