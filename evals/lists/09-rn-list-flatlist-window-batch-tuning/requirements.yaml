version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: explicit-virtualization-tuning
    description: Must explicitly set FlatList windowSize, maxToRenderPerBatch, and updateCellsBatchingPeriod.
  - id: stable-row-interaction-under-scroll
    description: Must include a row interaction (for example toggle/favorite) that updates correctly while preserving list position.
  - id: memoized-row-render-path
    description: Must use a memoized row boundary and stable renderItem callback/reference to reduce unrelated row re-renders.
