version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: chat-prepend-pagination
    description: Must support prepend pagination for older chat messages.
  - id: mvcp-configuration
    description: Must configure maintainVisibleContentPosition behavior intentionally for prepend updates.
  - id: controlled-near-bottom-autoscroll
    description: Must define deterministic near-bottom auto-scroll behavior without forcing jumps for users reading older messages.
  - id: implementation-flashlist-v2-component-migration
    description: Must use FlashList v2 component APIs and MUST NOT use deprecated MasonryFlashList component paths.
  - id: implementation-flashlist-v2-no-deprecated-props
    description: Must NOT rely on FlashList v2 deprecated props such as estimatedItemSize, estimatedListSize, estimatedFirstItemOffset, inverted, onBlankArea, or disableAutoLayout.
