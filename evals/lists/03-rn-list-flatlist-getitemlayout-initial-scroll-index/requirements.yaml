version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: initial-scroll-index-contract
    description: Must initialize FlatList with a non-zero initialScrollIndex.
  - id: getitemlayout-for-fixed-rows
    description: Must provide getItemLayout for fixed-size rows to support deterministic index-based scrolling.
  - id: index-scroll-safety
    description: Must handle index-based scrolling without relying on runtime measurement side effects.
  - id: implementation-rn-core-virtualizedlist-contract
    description: Must implement long-list rendering with FlatList/SectionList virtualization primitives and MUST NOT replace the same flow with ScrollView plus map rendering.
  - id: implementation-rn-core-keyextractor-nonindex
    description: Must provide stable keyExtractor based on logical item identity and MUST NOT use array-index keys for mutable or reorderable datasets.
