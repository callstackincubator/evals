version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: bidirectional-pagination
    description: Must support both onStartReached and onEndReached pagination paths.
  - id: duplicate-trigger-guards
    description: Must prevent duplicate or overlapping page fetches on either direction while loading is active.
  - id: threshold-driven-determinism
    description: Must set explicit start and end reach thresholds and trigger pagination only after those thresholds are crossed.
  - id: implementation-legendlist-bidirectional-cursor-contract
    description: Must maintain independent start/end pagination cursors and apply updates to the correct edge during bidirectional loading.
