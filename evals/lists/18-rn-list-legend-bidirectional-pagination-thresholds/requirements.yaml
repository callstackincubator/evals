version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: legendlist-adoption
    description: Must implement list rendering with @legendapp/list LegendList.
  - id: bidirectional-pagination
    description: Must support both onStartReached and onEndReached pagination paths.
  - id: explicit-start-end-thresholds
    description: Must explicitly configure onStartReachedThreshold and onEndReachedThreshold.
  - id: duplicate-trigger-guards
    description: Must prevent duplicate or overlapping page fetches on either direction while loading is active.
