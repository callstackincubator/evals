version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: bidirectional-pagination
    description: Must support both onStartReached and onEndReached pagination paths.
  - id: duplicate-trigger-guards
    description: Must prevent duplicate or overlapping page fetches on either direction while loading is active.
  - id: threshold-driven-determinism
    description: Must use explicit threshold-driven behavior so start/end pagination triggers are predictable.
  - id: implementation-legendlist-v2-keyextractor-contract
    description: Must provide stable LegendList keyExtractor identity and MUST NOT use index-based keys for dynamic list data.
  - id: implementation-legendlist-v2-mvcp-default
    description: Must keep LegendList maintainVisibleContentPosition enabled (default or explicit true) in dynamic/prepend/bidirectional flows and MUST NOT disable it.
