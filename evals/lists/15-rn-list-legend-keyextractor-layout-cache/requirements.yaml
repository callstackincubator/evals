version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: legendlist-adoption
    description: Must implement list rendering with @legendapp/list LegendList.
  - id: stable-keyextractor-contract
    description: Must provide a stable unique keyExtractor suitable for layout-cache reuse.
  - id: reorder-update-safety
    description: Must preserve correct rendering after reorder/insert updates without key collisions.
  - id: stable-row-identity-contract
    description: Must preserve stable row identity with deterministic keys so virtualization and row state reuse remain correct across updates.
  - id: virtualization-tuning-contract
    description: Must provide library-specific virtualization tuning inputs such as estimated item size or item typing for deterministic rendering behavior.
  - id: implementation-use-legend-list
    description: Must implement list behavior using Legend List APIs.
