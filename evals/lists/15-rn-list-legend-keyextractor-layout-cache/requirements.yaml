version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: legendlist-adoption
    description: Must implement list rendering with @legendapp/list LegendList.
  - id: stable-keyextractor-contract
    description: Must provide a stable unique keyExtractor suitable for layout-cache reuse.
  - id: reorder-update-safety
    description: Must preserve correct rendering after reorder/insert updates without key collisions.
  - id: implementation-legendlist-estimated-size-contract
    description: Must provide getEstimatedItemSize for deterministic layout-cache behavior in insert/reorder flows.
