version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: prepend-pagination-path
    description: Must implement top-reached prepend pagination flow for older items.
  - id: visible-position-preservation
    description: Must preserve visible content position after prepending data to prevent viewport jumps.
  - id: key-identity-stability
    description: Must keep message identity stable across prepend updates.
  - id: stable-row-identity-contract
    description: Must preserve stable row identity with deterministic keys so virtualization and row state reuse remain correct across updates.
  - id: list-pagination-overlap-guard
    description: Must guard against overlapping pagination triggers so concurrent list fetches do not duplicate rows or corrupt ordering.
  - id: implementation-use-flatlist
    description: Must implement list behavior using FlatList APIs.
