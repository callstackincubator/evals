version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: align-items-at-end-chat
    description: Must use LegendList alignItemsAtEnd for chat-style bottom alignment when content is short.
  - id: maintain-scroll-at-end
    description: Must configure maintainScrollAtEnd behavior for near-bottom new message handling.
  - id: deterministic-autoscroll-threshold
    description: Must define deterministic threshold behavior so users away from bottom are not forcibly snapped.
  - id: stable-row-identity-contract
    description: Must preserve stable row identity with deterministic keys so virtualization and row state reuse remain correct across updates.
  - id: list-pagination-overlap-guard
    description: Must guard against overlapping pagination triggers so concurrent list fetches do not duplicate rows or corrupt ordering.
  - id: virtualization-tuning-contract
    description: Must provide library-specific virtualization tuning inputs such as estimated item size or item typing for deterministic rendering behavior.
  - id: implementation-use-legend-list
    description: Must implement list behavior using Legend List APIs.
