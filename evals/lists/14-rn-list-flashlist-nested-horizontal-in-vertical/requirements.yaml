version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: nested-list-architecture
    description: Must implement vertical list + horizontal row carousel composition with explicit list architecture.
  - id: flashlist-parent-child-guidance
    description: Must align nested list implementation with FlashList guidance for parent-child list combinations.
  - id: stable-carousel-identity
    description: Must keep carousel item identity stable so nested list updates do not cause render artifacts.
  - id: implementation-flashlist-v2-parent-child-nesting-contract
    description: Must keep parent vertical list and nested horizontal carousels on FlashList v2 primitives (not ScrollView wrappers) to preserve parent-child list optimization behavior.
