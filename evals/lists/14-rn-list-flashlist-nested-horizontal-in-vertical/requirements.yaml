version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: nested-list-architecture
    description: Must implement vertical list + horizontal row carousel composition with explicit list architecture.
  - id: flashlist-parent-child-guidance
    description: Must align nested list implementation with FlashList guidance for parent-child list combinations.
  - id: stable-carousel-identity
    description: Must keep carousel item identity stable so nested list updates do not cause render artifacts.
  - id: implementation-flashlist-v2-component-migration
    description: Must use FlashList v2 component APIs and MUST NOT use deprecated MasonryFlashList component paths.
  - id: implementation-flashlist-v2-no-deprecated-props
    description: Must NOT rely on FlashList v2 deprecated props such as estimatedItemSize, estimatedListSize, estimatedFirstItemOffset, inverted, onBlankArea, or disableAutoLayout.
