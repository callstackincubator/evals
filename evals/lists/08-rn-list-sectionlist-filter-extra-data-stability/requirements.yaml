version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: filter-driven-section-derivation
    description: Must derive filtered sections deterministically from source data and query input.
  - id: empty-sections-pruned-after-filter
    description: Must exclude sections whose filtered data arrays are empty so stale section headers are not rendered.
  - id: extradata-or-immutable-update
    description: Must use extraData or immutable section updates so filtered output refreshes reliably.
  - id: empty-state-correctness
    description: Must render empty-list behavior when filter removes all visible rows.
  - id: implementation-use-sectionlist-08-rn-list-sectionlist-filter-extra-data-stability
    description: Must implement list behavior using SectionList APIs for the 08-rn-list-sectionlist-filter-extra-data-stability eval.
