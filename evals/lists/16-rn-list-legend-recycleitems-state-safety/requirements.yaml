version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: recycleitems-enabled
    description: Must enable recycleItems for LegendList and use it intentionally.
  - id: recycled-state-reset-contract
    description: Must prevent recycled local state from leaking across different item identities.
  - id: identity-driven-row-behavior
    description: Must bind row state behavior to item identity, not container instance.
  - id: stable-row-identity-contract-16-rn-list-legend-recycleitems-state-safety
    description: Must preserve stable row identity with deterministic keys so virtualization and row state reuse remain correct across updates for the 16-rn-list-legend-recycleitems-state-safety eval.
  - id: virtualization-tuning-contract-16-rn-list-legend-recycleitems-state-safety
    description: Must provide library-specific virtualization tuning inputs such as estimated item size or item typing for deterministic rendering behavior for the 16-rn-list-legend-recycleitems-state-safety eval.
  - id: implementation-use-legend-list-16-rn-list-legend-recycleitems-state-safety
    description: Must implement list behavior using Legend List APIs for the 16-rn-list-legend-recycleitems-state-safety eval.
