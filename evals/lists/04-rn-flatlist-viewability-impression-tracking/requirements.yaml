version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: flatlist-viewability-config-present
    description: Must define a `viewabilityConfig` object for the `FlatList`.
  - id: on-viewable-items-changed-attached
    description: Must attach `onViewableItemsChanged` to `FlatList`.
  - id: flatlist-extra-data-wired-to-visible-state
    description: Must pass the current visibility state to `FlatList` through `extraData`.
  - id: visible-row-style-driven-by-viewable-ids
    description: Must change row style when the item id is in the current set of viewable ids.
  - id: implementation-use-flatlist-key-extractor
    description: Must provide FlatList `keyExtractor` using stable feed ids.
