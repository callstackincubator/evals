version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: gesture-handler-pan-api
    description: Must use react-native-gesture-handler gesture APIs to drive drag updates.
  - id: implementation-rngh-pan-gesturebuilder-contract
    description: Must implement drag with Gesture.Pan builder callbacks (onBegin/onUpdate/onEnd) and MUST NOT use legacy useAnimatedGestureHandler paths.
  - id: translation-shared-value
    description: Must update card translation through Reanimated shared values during gesture updates.
  - id: deterministic-snap-on-release
    description: Must resolve release to a deterministic snap point using velocity and position threshold logic.
