version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: gesture-handler-pan-api
    description: Must use react-native-gesture-handler gesture APIs to drive drag updates.
  - id: translation-shared-value
    description: Must update card translation through Reanimated shared values during gesture updates.
  - id: deterministic-snap-on-release
    description: Must resolve release to a deterministic snap point based on velocity and or position thresholds.
