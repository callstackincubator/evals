version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: animated-entering-for-new-items
    description: Row container must set Reanimated `entering={...}` animation (for example `FadeInDown`) on `Animated.View`.
  - id: animated-exiting-for-removed-items
    description: Row container must set Reanimated `exiting={...}` animation (for example `FadeOutUp`) on `Animated.View`.
  - id: stable-item-identity
    description: List rendering must use stable row identity via `keyExtractor`/`key` from persistent item IDs so entering/exiting animations bind to the correct row instances.
