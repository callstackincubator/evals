version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: animated-entering-for-new-items
    description: Must apply a Reanimated entering animation for newly added rows.
  - id: animated-exiting-for-removed-items
    description: Must apply a Reanimated exiting animation for removed rows.
  - id: stable-item-identity
    description: Must preserve deterministic item identity keys so row animation behavior is stable.
  - id: ui-thread-animation-driver
    description: Must run high-frequency animation state on Reanimated shared values and worklets instead of per-frame React state updates.
  - id: layout-transition-determinism
    description: Must keep layout enter and exit transitions deterministic so element appearance and removal do not flash or jump.
  - id: implementation-use-reanimated
    description: Must implement animation behavior with react-native-reanimated primitives.
