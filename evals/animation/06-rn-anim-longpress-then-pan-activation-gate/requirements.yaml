version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: composed-gesture-sequence
    description: Must compose gestures so drag activation is gated by long-press completion.
  - id: accidental-drag-prevention
    description: Must prevent translation updates before the activation gate is satisfied.
  - id: visual-activation-feedback
    description: Must provide deterministic visual feedback for pre-activation versus active-drag states.
  - id: ui-thread-animation-driver-06-rn-anim-longpress-then-pan-activation-gate
    description: Must run high-frequency animation state on Reanimated shared values and worklets instead of per-frame React state updates for the 06-rn-anim-longpress-then-pan-activation-gate eval.
  - id: gesture-lifecycle-determinism-06-rn-anim-longpress-then-pan-activation-gate
    description: Must implement deterministic begin, update, and end gesture transitions so interactive animation always resolves to a valid resting state for the 06-rn-anim-longpress-then-pan-activation-gate eval.
  - id: implementation-use-reanimated-06-rn-anim-longpress-then-pan-activation-gate
    description: Must implement animation behavior with react-native-reanimated primitives for the 06-rn-anim-longpress-then-pan-activation-gate eval.
