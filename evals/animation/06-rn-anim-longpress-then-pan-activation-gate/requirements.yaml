version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: composed-gesture-sequence
    description: Must compose Gesture.LongPress and Gesture.Pan so pan updates start only after long-press activation.
  - id: implementation-rngh-longpress-pan-gating-contract
    description: Must compose LongPress and Pan with Gesture API composition primitives so pan updates begin only after long-press activation, without legacy useAnimatedGestureHandler.
  - id: accidental-drag-prevention
    description: Must guard Pan.onUpdate so translation shared values are not updated before the gate shared value is active.
  - id: visual-activation-feedback
    description: Must derive pre-activation versus active visuals from shared values using useAnimatedStyle (for example via interpolateColor).
