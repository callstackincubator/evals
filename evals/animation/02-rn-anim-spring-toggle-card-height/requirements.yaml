version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: deterministic-collapsed-expanded-states
    description: Must define deterministic collapsed and expanded visual states for the card.
  - id: implementation-reanimated-shared-value-style-contract
    description: Must represent expand/collapse progress with a Reanimated shared value and map it to card/detail styles via useAnimatedStyle.
  - id: implementation-reanimated-interpolate-clamp-contract
    description: Must derive animated card height or detail visibility with interpolate and bounded extrapolation/clamp behavior (for example Extrapolation.CLAMP) instead of direct React style jumps.
  - id: spring-driven-transition
    description: Must toggle expand/collapse by animating the shared value with withSpring from react-native-reanimated.
