version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: deterministic-collapsed-expanded-states
    description: Must represent collapsed/expanded states with a Reanimated progress shared value (for example `0`/`1`) and map it to card height via `interpolate(...)` in `useAnimatedStyle`.
  - id: spring-driven-transition
    description: Header press must toggle the progress shared value between collapsed/expanded states using `withSpring(...)` from `react-native-reanimated`.
  - id: no-react-layout-jump
    description: Card/details visuals must be driven by Reanimated animated styles (`Animated.View` + `useAnimatedStyle`) instead of direct non-animated React style toggles.
