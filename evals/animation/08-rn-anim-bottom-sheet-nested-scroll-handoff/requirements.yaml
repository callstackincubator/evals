version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: sheet-snap-point-model
    description: Must define deterministic sheet snap points and animate sheet position to those targets.
  - id: nested-scroll-gesture-coordination
    description: Must coordinate sheet pan and nested scroll gestures to avoid dead zones or double-handling.
  - id: velocity-aware-dismiss-or-expand
    description: Must account for release velocity to choose dismiss, collapse, or expand outcome deterministically.
