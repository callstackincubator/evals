version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: simultaneous-pinch-and-pan
    description: Must compose `Gesture.Pinch()` and `Gesture.Pan()` with `Gesture.Simultaneous(...)` from `react-native-gesture-handler`.
  - id: scale-and-translation-shared-values
    description: Must store zoom and translation in Reanimated shared values (`scale`, `translateX`, `translateY`) and apply them through `useAnimatedStyle` transform.
  - id: min-scale-clamp-usage
    description: Must clamp zoom using the existing `MIN_SCALE` constant inside `Gesture.Pinch().onUpdate(...)`
  - id: max-scale-clamp-usage
    description: Must clamp zoom using the existing `MAX_SCALE` constant inside `Gesture.Pinch().onUpdate(...)`
  - id: viewport-size-pan-bounds-usage
    description: Must use the existing `VIEWPORT_SIZE` to constrain movement while zoomed inside `Gesture.Pan().onUpdate(...)`.
