version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: simultaneous-pinch-and-pan
    description: Must compose pinch and pan with Gesture.Simultaneous and attach the composed gesture through GestureDetector.
  - id: implementation-rngh-pinch-pan-simultaneous-contract
    description: Must use Gesture.Simultaneous for pinch + pan updates and MUST NOT rely on legacy useAnimatedGestureHandler paths.
  - id: scale-and-translation-shared-values
    description: Must store scale, translateX, and translateY in useSharedValue and apply them in useAnimatedStyle transforms.
  - id: bounded-pan-while-zoomed
    description: Must clamp pan offsets with a worklet clamp using bounds derived from the current scale.
