version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: simultaneous-pinch-and-pan
    description: Must compose pinch and pan gestures to run simultaneously using Gesture Handler composition primitives.
  - id: scale-and-translation-shared-values
    description: Must store zoom scale and translation in Reanimated shared values.
  - id: bounded-pan-while-zoomed
    description: Must clamp translation bounds based on current zoom so content remains partially visible.
  - id: ui-thread-animation-driver-07-rn-anim-pinch-pan-simultaneous-photo-canvas
    description: Must run high-frequency animation state on Reanimated shared values and worklets instead of per-frame React state updates for the 07-rn-anim-pinch-pan-simultaneous-photo-canvas eval.
  - id: gesture-lifecycle-determinism-07-rn-anim-pinch-pan-simultaneous-photo-canvas
    description: Must implement deterministic begin, update, and end gesture transitions so interactive animation always resolves to a valid resting state for the 07-rn-anim-pinch-pan-simultaneous-photo-canvas eval.
  - id: implementation-use-reanimated-07-rn-anim-pinch-pan-simultaneous-photo-canvas
    description: Must implement animation behavior with react-native-reanimated primitives for the 07-rn-anim-pinch-pan-simultaneous-photo-canvas eval.
