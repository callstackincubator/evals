version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: modal-gesture-root-view-setup
    description: Must configure GestureHandlerRootView in the modal interaction path required for Android modal gesture handling.
  - id: gesture-control-inside-modal
    description: Must place a GestureDetector with a Gesture.Pan control inside the modal content path.
  - id: implementation-rngh-modal-root-boundary-contract
    description: Must keep modal gesture controls under a GestureHandlerRootView and use current Gesture API callbacks (no legacy useAnimatedGestureHandler).
  - id: schedule-on-rn-modal-dismiss-bridge
    description: Must use scheduleOnRN for worklet-to-React dismiss state updates and MUST NOT use deprecated runOnJS.
