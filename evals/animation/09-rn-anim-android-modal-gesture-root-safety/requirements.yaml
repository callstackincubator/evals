version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: modal-gesture-root-view-setup
    description: Must render modal gesture content under `GestureHandlerRootView` (or `gestureHandlerRootHOC`) in the `Modal` subtree for Android gesture handling.
  - id: gesture-control-inside-modal
    description: Modal content must include an RNGH gesture control using `Gesture.*` (for example `Gesture.Pan()`) attached with `GestureDetector`.
  - id: implementation-rngh-modal-root-boundary-contract
    description: Must implement modal gesture logic with current RNGH builder callbacks (`onUpdate`/`onEnd`) and MUST NOT use legacy `useAnimatedGestureHandler`.
  - id: close-threshold-dismiss-branch
    description: Pan `onEnd` must use `CLOSE_THRESHOLD` to decide between modal dismiss and snap-back.
  - id: schedule-on-rn-modal-dismiss-bridge
    description: Dismiss state updates from gesture/worklet context must call `scheduleOnRN(...)` and MUST NOT use deprecated `runOnJS`.
  - id: no-platform-specific-breakage-path
    description: GestureDetector and its gesture-driven modal sheet must remain descendants of the modal `GestureHandlerRootView` boundary (no detached modal gesture path).
