version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: ui-thread-worklet-computation
    description: Must perform animation-critical computation inside a worklet on the UI runtime.
  - id: schedule-on-ui-dispatch
    description: Must use scheduleOnUI from react-native-worklets for explicit React-runtime to UI-runtime dispatch and MUST NOT use deprecated runOnUI.
  - id: controlled-bridge-to-react-runtime
    description: Must use scheduleOnRN from react-native-worklets for React-runtime callbacks and MUST NOT use deprecated runOnJS.
  - id: throttled-or-bounded-react-updates
    description: Must avoid per-frame unbounded React state updates from the worklet bridge path.
