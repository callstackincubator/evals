version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: ui-thread-worklet-computation
    description: Must perform animation-critical computation inside a worklet on the UI runtime.
  - id: controlled-bridge-to-react-runtime
    description: Must use react-native-worklets bridge primitives such as scheduleOnRN and or runOnRN for React-runtime callbacks.
  - id: throttled-or-bounded-react-updates
    description: Must avoid per-frame unbounded React state updates from the worklet bridge path.
  - id: ui-thread-animation-driver-10-rn-anim-worklet-thread-bridge-schedule-on-rn
    description: Must run high-frequency animation state on Reanimated shared values and worklets instead of per-frame React state updates for the 10-rn-anim-worklet-thread-bridge-schedule-on-rn eval.
  - id: implementation-use-reanimated-10-rn-anim-worklet-thread-bridge-schedule-on-rn
    description: Must implement animation behavior with react-native-reanimated primitives for the 10-rn-anim-worklet-thread-bridge-schedule-on-rn eval.
