version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: ui-thread-worklet-computation
    description: Must run animation-critical computation in UI-runtime worklets (for example `useDerivedValue`/worklet functions) over shared values.
  - id: schedule-on-ui-dispatch
    description: Must dispatch start/stop or control worklet functions from React runtime using `scheduleOnUI(...)` from `react-native-worklets` and MUST NOT use deprecated `runOnUI`.
  - id: controlled-bridge-to-react-runtime
    description: Must bridge UI-runtime checkpoint updates back to React via `scheduleOnRN(...)` from `react-native-worklets` and MUST NOT use deprecated `runOnJS`.
  - id: throttled-or-bounded-react-updates
    description: Must gate `scheduleOnRN(...)` behind explicit bucket/checkpoint logic in a UI worklet reaction (for example `useAnimatedReaction`) instead of calling it every frame.
