version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: create-and-use-worklet-runtime
    description: Must create a dedicated worklets runtime with createWorkletRuntime and schedule compute on it with scheduleOnRuntime, not deprecated runOnRuntime.
  - id: schedule-on-rn-bridge
    description: Must bridge results back to React runtime with scheduleOnRN from react-native-worklets and MUST NOT use deprecated runOnJS.
  - id: bounded-bridge-frequency
    description: Must call scheduleOnRN only at bounded checkpoints (for example every N batches), not for every runtime iteration.
