version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: pressable-drives-animation
    description: Must render a Pressable interaction that triggers animation state changes on press-in and press-out.
  - id: ui-thread-shared-value-driver
    description: Must drive press feedback from Reanimated shared values and animated styles rather than per-frame React state updates.
  - id: reanimated-timing-scale
    description: Must use react-native-reanimated shared values and withTiming to animate a scale transform.
  - id: reset-to-rest-state
    description: Must restore the visual scale to a deterministic rest value after release.
  - id: implementation-use-reanimated-01-rn-anim-pressable-scale-with-timing
    description: Must implement animation behavior with react-native-reanimated primitives for the 01-rn-anim-pressable-scale-with-timing eval.
