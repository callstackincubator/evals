version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: pressable-onpressin-onpressout-contract
    description: Must drive the interaction via explicit Pressable onPressIn and onPressOut handlers.
  - id: reanimated-timing-scale
    description: Must use react-native-reanimated shared values and withTiming to animate a scale transform.
  - id: implementation-pressed-rest-target-contract
    description: Must define explicit pressed and rest scale targets (constants or equivalent) and drive them from onPressIn/onPressOut via withTiming rather than toggling an implicit boolean style branch.
