version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: pressable-drives-animation
    description: Must render a `Pressable` tap target (or `Animated.createAnimatedComponent(Pressable)`) and trigger animation updates from `onPressIn` and `onPressOut`.
  - id: reanimated-timing-scale
    description: Must store scale in a Reanimated `useSharedValue` and animate it with `withTiming(...)`, then apply it through `useAnimatedStyle` transform (`scale`).
  - id: reset-to-rest-state
    description: Must drive the scale shared value back to a deterministic rest value via `withTiming(...)` and `onPressOut`.
