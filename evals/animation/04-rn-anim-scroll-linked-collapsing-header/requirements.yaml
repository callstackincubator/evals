version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: implementation-reanimated-scroll-handler-contract
    description: Must update a shared value from event.contentOffset.y inside useAnimatedScrollHandler.
  - id: implementation-animated-scrollview-onscroll-contract
    description: Must wire the animated scroll handler into an Animated.ScrollView onScroll prop.
  - id: implementation-header-animatedstyle-interpolation-contract
    description: Must compute collapsing header styles in useAnimatedStyle using interpolate.
  - id: implementation-clamped-header-bounds-contract
    description: Must clamp header interpolation with Extrapolation.CLAMP and min/max header constants.
