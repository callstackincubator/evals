version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: animated-scroll-handler-source
    description: Must capture scroll offset with Reanimated `useAnimatedScrollHandler(...)` attached to `Animated.ScrollView onScroll`.
  - id: interpolated-header-transform-or-opacity
    description: Must compute header visuals in `useAnimatedStyle` using `interpolate(...)` from the shared scroll value (for example height and/or opacity).
  - id: clamped-header-range
    description: Interpolation for header collapse must use clamped extrapolation (`Extrapolation.CLAMP`) with explicit input/output ranges.
