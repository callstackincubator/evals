version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: keyboard-aware-scroll-behavior
    description: Must use keyboard-aware scroll behavior from react-native-keyboard-controller components or hooks.
  - id: sticky-footer-coordination
    description: Must coordinate sticky footer position with keyboard animation values without overlap glitches.
  - id: interactive-dismiss-stability
    description: Must keep layout stable during interactive keyboard dismissal and refocus transitions.
  - id: ui-thread-animation-driver
    description: Must run high-frequency animation state on Reanimated shared values and worklets instead of per-frame React state updates.
  - id: gesture-lifecycle-determinism
    description: Must implement deterministic begin, update, and end gesture transitions so interactive animation always resolves to a valid resting state.
  - id: implementation-use-keyboard-controller
    description: Must implement keyboard interaction with react-native-keyboard-controller APIs.
