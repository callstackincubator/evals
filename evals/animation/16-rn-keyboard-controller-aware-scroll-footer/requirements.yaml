version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: keyboard-aware-scroll-behavior
    description: Must use KeyboardAwareScrollView from react-native-keyboard-controller.
  - id: implementation-use-reanimated-keyboard-hook
    description: Must read keyboard animation values via useReanimatedKeyboardAnimation from react-native-keyboard-controller.
  - id: implementation-footer-position-from-animated-style
    description: Must compute sticky footer position inside a Reanimated useAnimatedStyle using keyboard shared values.
