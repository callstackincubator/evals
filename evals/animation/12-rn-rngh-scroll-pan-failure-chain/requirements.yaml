version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: explicit-gesture-failure-chain
    description: Must use Gesture Handler composition or external failure requirements to model scroll versus swipe precedence.
  - id: no-dead-zone-interaction
    description: Must avoid dead-zone behavior where neither scroll nor swipe responds.
  - id: deterministic-axis-thresholds
    description: Must define explicit axis thresholds or activation offsets for resolving competing gestures.
  - id: ui-thread-animation-driver-12-rn-rngh-scroll-pan-failure-chain
    description: Must run high-frequency animation state on Reanimated shared values and worklets instead of per-frame React state updates for the 12-rn-rngh-scroll-pan-failure-chain eval.
  - id: gesture-lifecycle-determinism-12-rn-rngh-scroll-pan-failure-chain
    description: Must implement deterministic begin, update, and end gesture transitions so interactive animation always resolves to a valid resting state for the 12-rn-rngh-scroll-pan-failure-chain eval.
  - id: implementation-use-rngh-gestures-12-rn-rngh-scroll-pan-failure-chain
    description: Must implement gesture behavior with react-native-gesture-handler primitives for the 12-rn-rngh-scroll-pan-failure-chain eval.
