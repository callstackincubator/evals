version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: explicit-gesture-failure-chain
    description: Must use Gesture Handler composition or external failure requirements to model scroll versus swipe precedence.
  - id: no-dead-zone-interaction
    description: Must avoid dead-zone behavior where neither scroll nor swipe responds.
  - id: deterministic-axis-thresholds
    description: Must define explicit axis thresholds or activation offsets for resolving competing gestures.
  - id: ui-thread-animation-driver
    description: Must run high-frequency animation state on Reanimated shared values and worklets instead of per-frame React state updates.
  - id: gesture-lifecycle-determinism
    description: Must implement deterministic begin, update, and end gesture transitions so interactive animation always resolves to a valid resting state.
  - id: implementation-use-rngh-gestures
    description: Must implement gesture behavior with react-native-gesture-handler primitives.
