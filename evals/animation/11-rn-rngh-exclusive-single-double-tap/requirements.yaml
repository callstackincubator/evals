version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: rngh-gesturedetector-usage
    description: Must use GestureDetector with react-native-gesture-handler gesture objects.
  - id: implementation-rngh-exclusive-tap-contract
    description: Must implement tap handling with Gesture.Exclusive (or equivalent explicit exclusivity) using current Gesture API callbacks and no legacy useAnimatedGestureHandler.
  - id: schedule-on-rn-tap-outcome-bridge
    description: Must use scheduleOnRN for worklet-to-React tap outcome updates and MUST NOT use deprecated runOnJS.
  - id: exclusive-tap-composition
    description: Must compose single and double tap gestures with explicit exclusivity so both handlers do not fire for the same interaction.
  - id: deterministic-tap-outcomes
    description: Must implement deterministic single versus double tap outcome timing semantics.
