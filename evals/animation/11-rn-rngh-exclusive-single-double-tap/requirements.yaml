version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: rngh-gesturedetector-usage
    description: Must use GestureDetector with react-native-gesture-handler gesture objects.
  - id: implementation-rngh-exclusive-tap-contract
    description: Must implement tap handling with Gesture.Exclusive using current Gesture API callbacks and no legacy useAnimatedGestureHandler.
  - id: schedule-on-rn-tap-outcome-bridge
    description: Must use scheduleOnRN for worklet-to-React tap outcome updates and MUST NOT use deprecated runOnJS.
  - id: exclusive-tap-composition
    description: Must use Gesture.Exclusive to compose single and double tap gesture objects for the same tap target.
  - id: deterministic-tap-outcomes
    description: Must enforce deterministic single/double outcomes with explicit maxDelay/maxDuration tap timing constraints.
