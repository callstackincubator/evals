version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: rngh-gesturedetector-usage
    description: Must render the tap target under `GestureHandlerRootView` and attach gestures with `GestureDetector gesture={...}` from `react-native-gesture-handler`.
  - id: implementation-rngh-exclusive-tap-contract
    description: Must define both gestures with `Gesture.Tap()` builders (`singleTap` and `doubleTap`) using current builder callbacks (`onEnd`) and MUST NOT use legacy `useAnimatedGestureHandler`.
  - id: schedule-on-rn-tap-outcome-bridge
    description: Must call `scheduleOnRN(...)` inside tap `onEnd` success paths to update React state and MUST NOT use deprecated `runOnJS`.
  - id: exclusive-tap-composition
    description: Must compose taps with `Gesture.Exclusive(doubleTap, singleTap)` so exclusivity is defined by RNGH composition APIs.
  - id: deterministic-tap-outcomes
    description: Must configure tap-recognition windows via `Gesture.Tap().numberOfTaps(2).maxDelay(...)` for double tap and `Gesture.Tap().numberOfTaps(1)` for single tap, with explicit duration limits via `maxDuration(...)`.
