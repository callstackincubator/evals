version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: durable-offline-outbox
    description: Must persist outbox mutations at a stable key with id, payload, type, and attempts metadata per queued item.
  - id: connectivity-gated-replay
    description: Must gate automatic replay on connectivity state while still supporting explicit manual replay trigger flow.
  - id: idempotent-mutation-ids
    description: Must persist applied mutation IDs and skip already-applied IDs during replay to prevent duplicate effects.
  - id: implementation-asyncstorage-package
    description: Must use @react-native-async-storage/async-storage package APIs and MUST NOT use removed AsyncStorage from react-native core.
  - id: implementation-asyncstorage-idempotent-outbox-contract
    description: Must persist outbox queue and applied-mutation IDs in AsyncStorage with deterministic replay guards so reconnect retries stay idempotent.
