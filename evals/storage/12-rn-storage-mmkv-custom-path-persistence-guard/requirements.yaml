version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: custom-path-initialization
    description: Must create data MMKV with explicit custom path and keep registry metadata in a separate stable instance.
  - id: path-stability-guard
    description: Must persist configured path and compare it at startup to detect path drift before normal reads/writes.
  - id: path-mismatch-recovery
    description: On path mismatch, must migrate/import data from previous path instance into current path instance before continuing.
  - id: implementation-mmkv-createmmkv
    description: Must create MMKV instances with createMMKV from react-native-mmkv and keep instance IDs explicit for scope separation.
  - id: implementation-mmkv-no-legacy-constructor
    description: Must NOT use legacy constructor-style MMKV initialization patterns from older docs; use current react-native-mmkv v4 API style.
