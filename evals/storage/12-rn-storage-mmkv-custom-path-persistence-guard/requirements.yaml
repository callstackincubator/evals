version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: custom-path-initialization
    description: Must initialize MMKV with explicit custom path configuration.
  - id: registry-backed-path-contract
    description: Must persist the configured MMKV path in a registry contract so path drift can be detected on startup.
  - id: path-stability-guard
    description: Must keep path derivation stable across restarts and avoid per-session path drift.
  - id: path-mismatch-recovery
    description: Must provide a deterministic recovery or migration path when configured path changes.
  - id: implementation-use-mmkv-12-rn-storage-mmkv-custom-path-persistence-guard
    description: Must implement persistence behavior using MMKV APIs for the 12-rn-storage-mmkv-custom-path-persistence-guard eval.
