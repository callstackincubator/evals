version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: payload-chunking-strategy
    description: Must shard large documents into fixed-size chunk keys and persist chunks plus manifest through batched AsyncStorage writes.
  - id: manifest-version-contract
    description: Manifest must include ordered chunkKeys with chunkCount, totalLength, and schemaVersion metadata used during reassembly.
  - id: missing-chunk-recovery
    description: Loader must detect missing/corrupt chunks or length mismatch, clear manifest+chunks with multiRemove, and return a defined empty-document fallback state.
  - id: implementation-asyncstorage-package
    description: Must use @react-native-async-storage/async-storage package APIs and MUST NOT use removed AsyncStorage from react-native core.
  - id: implementation-asyncstorage-manifest-chunk-contract
    description: Must persist chunked payload manifests and shard keys via AsyncStorage batch APIs, then validate chunk integrity before reassembly.
