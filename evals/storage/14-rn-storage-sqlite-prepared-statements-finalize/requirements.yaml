version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: uses-prepared-statements
    description: Must use prepareAsync + executeAsync with bound parameters for dynamic values in both write and read paths.
  - id: finalize-in-finally
    description: Must finalize every prepared statement handle in finally blocks using finalizeAsync.
  - id: no-sql-string-interpolation
    description: Must NOT interpolate user-controlled values directly into SQL text; use parameter binding.
  - id: implementation-expo-sqlite-modern-api
    description: Must use modern expo-sqlite APIs from expo-sqlite imports and MUST NOT rely on expo-sqlite/legacy paths.
  - id: no-dynamic-input-via-execasync
    description: Must avoid passing dynamic user-controlled values through execAsync SQL strings; use runAsync or prepared statements for bound parameters.
