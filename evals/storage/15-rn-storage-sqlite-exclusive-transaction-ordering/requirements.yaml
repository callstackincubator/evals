version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: exclusive-transaction-usage
    description: Must enqueue critical writes through withExclusiveTransactionAsync to enforce deterministic write ordering.
  - id: transaction-scope-discipline
    description: Within exclusive transaction callback, writes must use transaction.runAsync (not out-of-scope db writes).
  - id: rollback-on-failure
    description: Must throw inside transaction to exercise rollback path so failed writes do not partially persist.
  - id: implementation-expo-sqlite-modern-api
    description: Must use modern expo-sqlite APIs from expo-sqlite imports and MUST NOT rely on expo-sqlite/legacy paths.
  - id: no-dynamic-input-via-execasync
    description: Must avoid passing dynamic user-controlled values through execAsync SQL strings; use runAsync or prepared statements for bound parameters.
  - id: ordering-not-withtransactionasync
    description: Must use withExclusiveTransactionAsync for ordering-critical writes and MUST NOT rely on withTransactionAsync for strict write serialization.
