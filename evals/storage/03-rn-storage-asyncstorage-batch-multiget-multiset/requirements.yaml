version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: uses-batched-key-apis
    description: Must persist related settings in one AsyncStorage.multiSet batch and rehydrate using AsyncStorage.multiGet over the same key set.
  - id: deterministic-batch-mapping
    description: Must convert multiGet tuple results into a key-addressable map before parsing, without index-order assumptions.
  - id: partial-failure-handling
    description: Must include a bounded per-key AsyncStorage.setItem fallback/retry path when multiSet fails.
  - id: implementation-asyncstorage-package
    description: Must use @react-native-async-storage/async-storage package APIs and MUST NOT use removed AsyncStorage from react-native core.
  - id: implementation-asyncstorage-multiset-fallback-contract
    description: Must use batched AsyncStorage.multiSet/multiGet for related keys and provide bounded per-key setItem fallback when batch writes fail.
