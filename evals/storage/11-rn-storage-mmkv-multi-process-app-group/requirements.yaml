version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: multi-process-mode-enabled
    description: Must enable MMKV multi-process mode for cross-process read and write scenarios.
  - id: shared-storage-path-contract
    description: Must configure a stable shared storage path or app group location contract.
  - id: cross-process-refresh-path
    description: Must include a deterministic refresh path so process external updates become visible.
  - id: appstate-active-refresh-hook
    description: Must refresh shared values when the app returns to active state so external process writes are observed promptly.
  - id: implementation-use-mmkv-11-rn-storage-mmkv-multi-process-app-group
    description: Must implement persistence behavior using MMKV APIs for the 11-rn-storage-mmkv-multi-process-app-group eval.
