version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: persisted-schema-version-key
    description: Must persist and read an explicit schema version key for stored data.
  - id: sequential-version-updates
    description: Must advance schema version sequentially and persist each successful migration step exactly once.
  - id: idempotent-migration-steps
    description: Must run migrations idempotently so repeated startup does not reapply completed steps.
  - id: incompatible-version-fallback
    description: Must provide a deterministic fallback path for incompatible or unknown versions.
  - id: implementation-use-asyncstorage-07-rn-storage-asyncstorage-schema-version-migration
    description: Must implement persistence behavior using AsyncStorage APIs for the 07-rn-storage-asyncstorage-schema-version-migration eval.
