version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: persisted-schema-version-key
    description: Must read and persist schema version through a dedicated version key and treat invalid versions as incompatible.
  - id: idempotent-migration-steps
    description: Must execute ordered versioned migrators and persist version after each successful step so reruns do not reapply completed work.
  - id: incompatible-version-fallback
    description: On incompatible version detection, must reset incompatible keys deterministically and stamp current schema version.
  - id: implementation-asyncstorage-package
    description: Must use @react-native-async-storage/async-storage package APIs and MUST NOT use removed AsyncStorage from react-native core.
  - id: implementation-promise-api-no-callback
    description: Must implement AsyncStorage access through Promise-based calls and MUST NOT rely on callback-form APIs.
