version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: versioned-entity-metadata
    description: Must track version or updatedAt metadata for local and remote entities used in reconciliation.
  - id: deterministic-conflict-policy
    description: Must apply an explicit deterministic conflict merge policy when local and remote edits diverge.
  - id: conflict-result-persistence
    description: Must persist merged outcomes and unresolved conflict markers consistently after reconciliation.
  - id: durable-parse-and-shape-guard-06-rn-storage-asyncstorage-reconnect-conflict-merge
    description: Must validate persisted payload shape on read and recover safely from invalid, missing, or corrupted serialized values for the 06-rn-storage-asyncstorage-reconnect-conflict-merge eval.
  - id: implementation-use-asyncstorage-06-rn-storage-asyncstorage-reconnect-conflict-merge
    description: Must implement persistence behavior using AsyncStorage APIs for the 06-rn-storage-asyncstorage-reconnect-conflict-merge eval.
