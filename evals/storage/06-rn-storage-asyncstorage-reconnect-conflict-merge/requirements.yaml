version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: versioned-entity-metadata
    description: Must reconcile local/remote entities using explicit version and updatedAt metadata per entity.
  - id: deterministic-conflict-policy
    description: For overlapping IDs, must apply deterministic field merge rules and compute next merged version consistently.
  - id: conflict-result-persistence
    description: Must persist merged entities and conflict markers together via batched AsyncStorage writes, including unresolved markers.
  - id: implementation-asyncstorage-package
    description: Must use @react-native-async-storage/async-storage package APIs and MUST NOT use removed AsyncStorage from react-native core.
  - id: implementation-asyncstorage-conflict-merge-persistence-contract
    description: Must persist merged entities and unresolved conflict markers together with batched AsyncStorage writes after deterministic merge resolution.
