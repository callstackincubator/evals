version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: pragma-wal-enabled
    description: Must enable journal_mode WAL during deterministic database initialization.
  - id: pragma-foreign-keys-enabled
    description: Must enable foreign_keys pragma so relational constraints are enforced.
  - id: init-once-contract
    description: Must apply initialization pragmas in a predictable startup path that avoids repeated inconsistent setup.
  - id: durable-parse-and-shape-guard-18-rn-storage-sqlite-wal-foreign-keys-init
    description: Must validate persisted payload shape on read and recover safely from invalid, missing, or corrupted serialized values for the 18-rn-storage-sqlite-wal-foreign-keys-init eval.
  - id: sqlite-transaction-boundary-contract-18-rn-storage-sqlite-wal-foreign-keys-init
    description: Must scope multi-step SQLite state transitions to explicit transaction boundaries for atomicity under failure for the 18-rn-storage-sqlite-wal-foreign-keys-init eval.
  - id: implementation-use-sqlite-18-rn-storage-sqlite-wal-foreign-keys-init
    description: Must implement persistence behavior using SQLite APIs for the 18-rn-storage-sqlite-wal-foreign-keys-init eval.
