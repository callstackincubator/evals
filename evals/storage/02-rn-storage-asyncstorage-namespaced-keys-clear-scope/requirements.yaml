version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: namespaced-key-strategy
    description: Must define separate global and user key namespaces/prefixes so persisted ownership is explicit in key design.
  - id: scoped-signout-clear
    description: Must implement sign-out clearing via getAllKeys -> prefix filter -> multiRemove(user keys) so only user-scoped keys are deleted.
  - id: no-global-clear-anti-pattern
    description: Must NOT use AsyncStorage.clear for sign-out and must preserve global preference keys across user resets.
  - id: implementation-asyncstorage-package
    description: Must use @react-native-async-storage/async-storage package APIs and MUST NOT use removed AsyncStorage from react-native core.
  - id: implementation-asyncstorage-prefix-filtered-signout-contract
    description: Must implement scoped sign-out cleanup via getAllKeys prefix filtering and multiRemove (no global clear) to preserve non-user namespaces.
