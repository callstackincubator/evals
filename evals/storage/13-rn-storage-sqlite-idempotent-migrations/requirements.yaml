version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: sqlite-schema-version-table
    description: Must persist schema version state in SQLite and read it before migration.
  - id: transactional-migration-application
    description: Must apply migration steps inside a transaction boundary.
  - id: no-reapply-completed-migrations
    description: Must not reapply already completed migration versions on later startups.
  - id: durable-parse-and-shape-guard
    description: Must validate persisted payload shape on read and recover safely from invalid, missing, or corrupted serialized values.
  - id: migration-ordering-and-version-commit
    description: Must execute migrations in deterministic version order and commit version advancement only after each step succeeds.
  - id: implementation-use-sqlite
    description: Must implement persistence behavior using SQLite APIs.
