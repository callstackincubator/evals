version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: sqlite-schema-version-table
    description: Must maintain schema version in a dedicated SQLite metadata table/row and read current version before applying migrations.
  - id: transactional-migration-application
    description: Must execute each pending migration version inside a transaction and persist version bump within the same boundary.
  - id: no-reapply-completed-migrations
    description: Must skip migrations at or below current version so startup reruns are idempotent.
  - id: implementation-expo-sqlite-modern-api
    description: Must use modern expo-sqlite APIs from expo-sqlite imports and MUST NOT rely on expo-sqlite/legacy paths.
  - id: no-dynamic-input-via-execasync
    description: Must avoid passing dynamic user-controlled values through execAsync SQL strings; use runAsync or prepared statements for bound parameters.
