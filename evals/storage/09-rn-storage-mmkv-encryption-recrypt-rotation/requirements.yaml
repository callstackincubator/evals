version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: encrypted-mmkv-instance
    description: Must initialize MMKV with an explicit encryption key for sensitive values.
  - id: recrypt-key-rotation-flow
    description: Must rotate encryption keys through a deterministic recrypt flow.
  - id: post-rotation-value-integrity-check
    description: Must verify sensitive values remain readable and unchanged after recrypt before marking rotation as successful.
  - id: rotation-recovery-path
    description: Must define a safe recovery path for invalid key or decrypt failure scenarios.
  - id: implementation-use-mmkv
    description: Must implement persistence behavior using MMKV APIs.
