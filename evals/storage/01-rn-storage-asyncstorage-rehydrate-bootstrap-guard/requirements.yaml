version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: hydration-loading-gate
    description: Must keep interactive UI behind an explicit hydration flag and clear it only after bootstrap read settles (success or fallback).
  - id: safe-json-parse-guards
    description: Must parse persisted session and draft payloads through guarded JSON parsing with typed fallbacks so malformed values never crash bootstrap.
  - id: single-bootstrap-read-path
    description: Must read session and draft keys in one AsyncStorage.multiGet bootstrap path and map by key, not separate ad-hoc reads.
  - id: implementation-asyncstorage-package
    description: Must use @react-native-async-storage/async-storage package APIs and MUST NOT use removed AsyncStorage from react-native core.
  - id: implementation-promise-api-no-callback
    description: Must implement AsyncStorage access through Promise-based calls and MUST NOT rely on callback-form APIs.
