version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: sqlite-outbox-schema
    description: Must define outbox table with status, attempts, next_retry_at, and updated_at columns for replay lifecycle.
  - id: atomic-replay-state-transitions
    description: Must update per-row replay state transitions inside withExclusiveTransactionAsync so status and attempts change atomically.
  - id: bounded-retry-policy
    description: Must enforce bounded retries with MAX_ATTEMPTS-style limit and next retry scheduling/backoff metadata.
  - id: implementation-expo-sqlite-modern-api
    description: Must use modern expo-sqlite APIs from expo-sqlite imports and MUST NOT rely on expo-sqlite/legacy paths.
  - id: no-dynamic-input-via-execasync
    description: Must avoid passing dynamic user-controlled values through execAsync SQL strings; use runAsync or prepared statements for bound parameters.
