version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: sqlite-outbox-schema
    description: Must define SQLite outbox records with deterministic status fields such as pending sent and failed.
  - id: atomic-replay-state-transitions
    description: Must transition replay status atomically with transaction protected updates.
  - id: bounded-retry-policy
    description: Must include bounded retry behavior with explicit attempt tracking or backoff policy.
  - id: implementation-use-sqlite
    description: Must implement persistence behavior using SQLite APIs relevant to this task.
