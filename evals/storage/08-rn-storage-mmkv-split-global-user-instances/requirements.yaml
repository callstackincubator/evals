version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: mmkv-multiple-instances
    description: Must configure multiple MMKV instances with explicit IDs for different data scopes.
  - id: user-scope-reset-only
    description: Must clear only user-scoped MMKV instance data during sign-out.
  - id: global-instance-retained
    description: Must keep global MMKV preferences intact across user session resets.
  - id: durable-parse-and-shape-guard-08-rn-storage-mmkv-split-global-user-instances
    description: Must validate persisted payload shape on read and recover safely from invalid, missing, or corrupted serialized values for the 08-rn-storage-mmkv-split-global-user-instances eval.
  - id: implementation-use-mmkv-08-rn-storage-mmkv-split-global-user-instances
    description: Must implement persistence behavior using MMKV APIs for the 08-rn-storage-mmkv-split-global-user-instances eval.
