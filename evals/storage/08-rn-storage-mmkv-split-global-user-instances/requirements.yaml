version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: mmkv-multiple-instances
    description: Must initialize separate MMKV instances with explicit IDs for global and user scopes.
  - id: user-scope-reset-only
    description: Sign-out must clear only the user-scoped MMKV instance and leave global instance data untouched.
  - id: global-instance-retained
    description: Global preferences must be read/written through global MMKV instance and remain available after user reset.
  - id: implementation-mmkv-createmmkv
    description: Must create MMKV instances with createMMKV from react-native-mmkv and keep instance IDs explicit for scope separation.
  - id: implementation-mmkv-no-legacy-constructor
    description: Must NOT use legacy constructor-style MMKV initialization patterns from older docs; use current react-native-mmkv v4 API style.
