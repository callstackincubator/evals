version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: mmkv-change-listener
    description: Must subscribe to MMKV value change listener APIs for relevant keys.
  - id: listener-driven-ui-sync
    description: Must update UI state from listener events instead of periodic polling.
  - id: listener-cleanup
    description: Must unsubscribe listeners during cleanup to avoid leaks and duplicate handlers.
  - id: durable-parse-and-shape-guard-10-rn-storage-mmkv-value-change-listener-sync
    description: Must validate persisted payload shape on read and recover safely from invalid, missing, or corrupted serialized values for the 10-rn-storage-mmkv-value-change-listener-sync eval.
  - id: listener-lifecycle-cleanup-contract
    description: Must subscribe and unsubscribe storage listeners in component lifecycle to avoid duplicate updates and leaks.
  - id: implementation-use-mmkv-10-rn-storage-mmkv-value-change-listener-sync
    description: Must implement persistence behavior using MMKV APIs for the 10-rn-storage-mmkv-value-change-listener-sync eval.
