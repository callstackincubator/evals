version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: mmkv-change-listener
    description: Must subscribe with addOnValueChangedListener and filter events to the target key used by the UI state.
  - id: listener-driven-ui-sync
    description: Must refresh UI state by re-reading MMKV in listener callback rather than polling or manual-only refresh.
  - id: listener-cleanup
    description: Must call listener.remove() in cleanup to prevent duplicate MMKV subscriptions across remounts.
  - id: implementation-mmkv-createmmkv
    description: Must create MMKV instances with createMMKV from react-native-mmkv and keep instance IDs explicit for scope separation.
  - id: implementation-mmkv-no-legacy-constructor
    description: Must NOT use legacy constructor-style MMKV initialization patterns from older docs; use current react-native-mmkv v4 API style.
