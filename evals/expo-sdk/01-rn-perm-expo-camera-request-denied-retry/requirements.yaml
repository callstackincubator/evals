version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: permission-request-on-demand
    description: Must request camera permission only after explicit user action, not automatically on initial mount.
  - id: denied-flow-retry-and-settings
    description: Must provide retry when permission is denied and provide settings recovery when permission is blocked/cannot-ask-again.
  - id: lifecycle-permission-refresh
    description: Must re-evaluate camera permission when the app returns to active state so UI reflects changes made in system settings.
  - id: degraded-path-no-crash
    description: Must include deterministic fallback UI when camera permission is unavailable instead of blank/failed preview.
  - id: single-flight-permission-request
    description: Must prevent duplicate concurrent permission requests while a request is in progress.
  - id: expo-camera-grant-gated-preview
    description: Must gate camera preview and capture actions behind granted camera permission state, with deterministic denied fallback UI.
  - id: implementation-expo-camera-cameraview-api
    description: Must use CameraView for preview and expo-camera permission APIs (useCameraPermissions or getCameraPermissionsAsync/requestCameraPermissionsAsync) instead of legacy camera-screen wiring.
