version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: imagepicker-pending-result-check
    description: Must check ImagePicker.getPendingResultAsync in startup or resume flow on Android-capable path.
  - id: pending-result-shared-success-pipeline
    description: Must process restored pending results through the same success handler as direct picker responses.
  - id: pending-result-deduplication
    description: Must avoid duplicate processing when pending and fresh picker responses overlap.
  - id: pending-result-cancel-error-branch
    description: Must preserve cancel and error branches for pending-result restoration path.
  - id: implementation-use-expo-permission-apis
    description: Must implement permission handling using Expo permission APIs.
