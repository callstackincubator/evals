version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: normalized-status-enum-contract
    description: Must define a shared normalized status contract that can represent unavailable, denied, blocked, granted, limited, and provisional states.
  - id: expo-and-rnpermissions-mapping-layer
    description: Must include explicit mapping logic from Expo permission responses and react-native-permissions statuses into the normalized contract.
  - id: ui-consumes-normalized-contract
    description: Must keep UI flows driven by normalized capability states rather than library-specific raw status objects.
  - id: unknown-status-safe-default
    description: Must map unknown or unmapped statuses to a defined unavailable-style state with capability actions disabled until resolved.
