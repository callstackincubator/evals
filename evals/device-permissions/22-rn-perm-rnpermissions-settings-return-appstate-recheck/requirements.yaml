version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: blocked-status-opensettings-path
    description: Must route blocked permission outcomes to openSettings or equivalent recovery action.
  - id: appstate-active-recheck
    description: Must re-check permission status when app returns to active state after settings navigation.
  - id: stale-blocked-state-avoidance
    description: Must avoid stale blocked-state UI when permission changed in system settings.
  - id: idempotent-resume-handling
    description: Must keep resume recheck logic idempotent without duplicate transition side effects.
  - id: implementation-rnpermissions-results-contract
    description: Must branch permission logic using react-native-permissions RESULTS status contract (for example denied/blocked/granted/limited/unavailable).
  - id: implementation-rnpermissions-request-for-blocked-detection
    description: On Android permission flows, must not rely on check/checkMultiple alone for blocked detection; include request/requestMultiple path where blocked status is needed.
