version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: blocked-status-opensettings-path
    description: Must route blocked permission outcomes to openSettings or equivalent recovery action.
  - id: appstate-active-recheck
    description: Must re-check permission status when app returns to active state after settings navigation.
  - id: stale-blocked-state-avoidance
    description: Must avoid stale blocked-state UI when permission changed in system settings.
  - id: idempotent-resume-handling
    description: Must keep resume recheck logic idempotent without duplicate transition side effects.
  - id: permission-capability-state-separation
    description: Must model permission status separately from feature capability and action outcome so granted permission is not treated as automatic operation success.
  - id: settings-return-state-refresh
    description: Must re-check permission state after returning from system settings before resuming permission-dependent actions.
  - id: implementation-use-react-native-permissions
    description: Must implement permission handling using react-native-permissions APIs.
