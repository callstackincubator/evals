version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: imagepicker-permission-before-library-launch
    description: Must request or verify media library permission before launching image library selection.
  - id: limited-access-branch
    description: Must model limited media access as a distinct state path rather than treating it as full grant.
  - id: partial-metadata-safe-handling
    description: Must tolerate partial asset metadata (for example null asset identifiers) without breaking selection flow.
  - id: limited-or-denied-fallback-ux
    description: Must provide deterministic fallback UX for limited or denied media access.
  - id: permission-capability-state-separation
    description: Must model permission status separately from feature capability and action outcome so granted permission is not treated as automatic operation success.
  - id: media-result-validation-contract
    description: Must validate media picker or camera results before success state transitions and keep cancellation/error outcomes explicit.
  - id: implementation-use-expo-permission-apis
    description: Must implement permission handling using Expo permission APIs.
