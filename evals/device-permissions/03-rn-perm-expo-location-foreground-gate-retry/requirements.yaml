version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: location-foreground-permission-request
    description: Must use expo-location foreground permission APIs before attempting location reads.
  - id: location-fetch-gated-by-grant
    description: Must only invoke location retrieval on granted foreground permission.
  - id: foreground-denied-retry-flow
    description: Must include a denied-state retry action and explicit fallback UX.
  - id: unavailable-or-error-safe-path
    description: Must handle unavailable or failed location reads without crash-oriented control flow.
  - id: permission-capability-state-separation-03-rn-perm-expo-location-foreground-gate-retry
    description: Must model permission status separately from feature capability and action outcome so granted permission is not treated as automatic operation success for the 03-rn-perm-expo-location-foreground-gate-retry eval.
  - id: implementation-use-expo-permission-apis-03-rn-perm-expo-location-foreground-gate-retry
    description: Must implement permission handling using Expo permission APIs for the 03-rn-perm-expo-location-foreground-gate-retry eval.
