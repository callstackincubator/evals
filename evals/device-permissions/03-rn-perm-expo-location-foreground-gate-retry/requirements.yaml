version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: location-foreground-permission-request
    description: Must use expo-location foreground permission APIs before attempting location reads.
  - id: location-fetch-gated-by-grant
    description: Must only invoke location retrieval on granted foreground permission.
  - id: foreground-denied-retry-flow
    description: Must include a denied-state retry action and explicit fallback UX.
  - id: unavailable-or-error-safe-path
    description: Must handle unavailable or failed location reads without crash-oriented control flow.

  - id: implementation-use-expo-permission-apis
    description: Must implement permission handling using Expo permission APIs relevant to this task.
