version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: location-foreground-before-background
    description: Must request and verify foreground location permission before requesting background permission.
  - id: background-rationale-step
    description: Must include an explicit rationale or explainer step before background request escalation.
  - id: android11-settings-redirection-handled
    description: Must handle Android 11+ background permission settings redirection with deterministic user guidance.
  - id: partial-grant-foreground-fallback
    description: Must keep foreground-only mode functional when background permission is denied.
  - id: implementation-expo-location-foreground-first
    description: Must request or verify foreground location permission before issuing location reads or escalating to background permission flows.
  - id: implementation-expo-location-status-driven-branching
    description: Must branch behavior from explicit expo-location permission/service status values rather than optimistic boolean-only assumptions.
