version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: unified-capability-state-model
    description: Must define explicit per-capability states including unavailable, denied, blocked, and granted plus limited or provisional where applicable.
  - id: adapter-isolation-by-library
    description: Must isolate library-specific permission logic behind adapter helpers instead of spreading conditionals across UI views.
  - id: per-capability-degraded-recovery
    description: Must provide deterministic degraded UX and retry or settings recovery actions for each capability.
  - id: resume-time-recheck
    description: Must include re-check behavior on app resume to avoid stale assumptions about previously granted permissions.
  - id: permission-capability-state-separation
    description: Must model permission status separately from feature capability and action outcome so granted permission is not treated as automatic operation success.
  - id: implementation-use-cross-library-permission-normalization
    description: Must normalize permission states across the targeted React Native permission libraries.
