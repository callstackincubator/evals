version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: save-to-photos-capture-path
    description: Must use saveToPhotos in a capture flow where saving behavior is explicit.
  - id: legacy-android-storage-guard
    description: Must handle Android 28 and below storage permission requirements for save-to-photos behavior.
  - id: save-failure-degraded-ux
    description: Must degrade gracefully when save permission is unavailable instead of failing capture flow.
  - id: capture-result-preserved-on-save-failure
    description: Must preserve usable capture result data even when save-to-photos write fails.
  - id: implementation-rn-image-picker-response-contract
    description: Must handle react-native-image-picker response contract with explicit didCancel/errorCode/success branches.
  - id: implementation-rn-image-picker-permission-aware-options
    description: Must apply permission-aware handling for options that require extra access (for example includeExtra/saveToPhotos) with deterministic degraded fallbacks.
