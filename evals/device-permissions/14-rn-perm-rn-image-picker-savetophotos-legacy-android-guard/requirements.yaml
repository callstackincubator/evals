version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: save-to-photos-capture-path
    description: Must use saveToPhotos in a capture flow where saving behavior is explicit.
  - id: legacy-android-storage-guard
    description: Must handle Android 28 and below storage permission requirements for save-to-photos behavior.
  - id: save-failure-degraded-ux
    description: Must degrade gracefully when save permission is unavailable instead of failing capture flow.
  - id: capture-result-preserved-on-save-failure
    description: Must preserve usable capture result data even when save-to-photos write fails.
  - id: permission-capability-state-separation-14-rn-perm-rn-image-picker-savetophotos-legacy-android-guard
    description: Must model permission status separately from feature capability and action outcome so granted permission is not treated as automatic operation success for the 14-rn-perm-rn-image-picker-savetophotos-legacy-android-guard eval.
  - id: media-result-validation-contract-14-rn-perm-rn-image-picker-savetophotos-legacy-android-guard
    description: Must validate media picker or camera results before success state transitions and keep cancellation/error outcomes explicit for the 14-rn-perm-rn-image-picker-savetophotos-legacy-android-guard eval.
  - id: implementation-use-react-native-image-picker-permissions-14-rn-perm-rn-image-picker-savetophotos-legacy-android-guard
    description: Must implement media permission-aware behavior using react-native-image-picker APIs for the 14-rn-perm-rn-image-picker-savetophotos-legacy-android-guard eval.
