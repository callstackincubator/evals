version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: rn-image-picker-response-branches
    description: Must branch explicitly on didCancel, errorCode or success response states.
  - id: permission-or-hardware-error-fallback
    description: Must treat permission and camera-unavailable error codes as degraded UX paths.
  - id: empty-assets-safe-path
    description: Must handle empty or missing assets arrays without runtime failure.
  - id: success-assets-consumption
    description: Must process success responses using picker assets data instead of implicit side effects.
  - id: implementation-rn-image-picker-response-contract
    description: Must handle react-native-image-picker response contract with explicit didCancel/errorCode/success branches.
  - id: implementation-rn-image-picker-permission-aware-options
    description: Must apply permission-aware handling for options that require extra access (for example includeExtra/saveToPhotos) with deterministic degraded fallbacks.
