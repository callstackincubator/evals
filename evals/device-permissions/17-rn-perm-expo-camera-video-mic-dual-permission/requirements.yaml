version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: dual-permission-requests-camera-microphone
    description: Must request and track camera and microphone permissions through expo-camera permission APIs.
  - id: record-gated-by-dual-grant
    description: Must gate video recording actions until both camera and microphone permissions are granted.
  - id: partial-grant-degraded-path
    description: Must provide deterministic degraded UX when only one permission is granted.
  - id: blocked-or-denied-recovery-actions
    description: Must provide retry and settings-oriented recovery for denied or blocked outcomes.
  - id: permission-capability-state-separation-17-rn-perm-expo-camera-video-mic-dual-permission
    description: Must model permission status separately from feature capability and action outcome so granted permission is not treated as automatic operation success for the 17-rn-perm-expo-camera-video-mic-dual-permission eval.
  - id: media-result-validation-contract-17-rn-perm-expo-camera-video-mic-dual-permission
    description: Must validate media picker or camera results before success state transitions and keep cancellation/error outcomes explicit for the 17-rn-perm-expo-camera-video-mic-dual-permission eval.
  - id: implementation-use-expo-permission-apis-17-rn-perm-expo-camera-video-mic-dual-permission
    description: Must implement permission handling using Expo permission APIs for the 17-rn-perm-expo-camera-video-mic-dual-permission eval.
