version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: expo-camera-permission-api
    description: Must use expo-camera permission APIs (hook or request/get async functions) to drive request state.
  - id: camera-preview-gated-by-grant
    description: Must gate camera preview rendering behind granted permission status.
  - id: denied-flow-retry-and-settings
    description: Must provide explicit denied or cannot-ask-again recovery actions (retry and settings guidance/action).
  - id: degraded-path-no-crash
    description: Must include a degraded UX path when camera permission is unavailable instead of failing silently.
  - id: permission-capability-state-separation-01-rn-perm-expo-camera-request-denied-retry
    description: Must model permission status separately from feature capability and action outcome so granted permission is not treated as automatic operation success for the 01-rn-perm-expo-camera-request-denied-retry eval.
  - id: media-result-validation-contract-01-rn-perm-expo-camera-request-denied-retry
    description: Must validate media picker or camera results before success state transitions and keep cancellation/error outcomes explicit for the 01-rn-perm-expo-camera-request-denied-retry eval.
  - id: implementation-use-expo-permission-apis-01-rn-perm-expo-camera-request-denied-retry
    description: Must implement permission handling using Expo permission APIs for the 01-rn-perm-expo-camera-request-denied-retry eval.
