version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: expo-camera-permission-api
    description: Must use expo-camera permission APIs (hook or request/get async functions) to drive request state.
  - id: camera-preview-gated-by-grant
    description: Must gate camera preview rendering behind granted permission status.
  - id: denied-flow-retry-and-settings
    description: Must provide explicit denied or cannot-ask-again recovery actions (retry and settings guidance/action).
  - id: degraded-path-no-crash
    description: Must include a degraded UX path when camera permission is unavailable instead of failing silently.
  - id: implementation-expo-camera-cameraview-api
    description: Must use CameraView for preview and expo-camera permission APIs (useCameraPermissions or getCameraPermissionsAsync/requestCameraPermissionsAsync) instead of legacy camera-screen wiring.
  - id: implementation-expo-camera-grant-gated-preview
    description: Must gate camera preview and capture actions behind granted camera permission state, with deterministic denied fallback UI.
