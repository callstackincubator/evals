version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: notifications-denied-settings-cta
    description: Must surface a settings recovery action when notification permission is denied or blocked.
  - id: app-resume-permission-refresh
    description: Must re-check notification permissions when app returns to foreground after settings navigation.
  - id: stale-permission-cache-avoidance
    description: Must avoid stale cached permission state for notification-gated features.
  - id: gated-feature-disabled-until-refresh
    description: Must keep notification-only actions disabled until refreshed permission state is resolved.
  - id: permission-capability-state-separation-11-rn-perm-expo-notifications-settings-return-refresh
    description: Must model permission status separately from feature capability and action outcome so granted permission is not treated as automatic operation success for the 11-rn-perm-expo-notifications-settings-return-refresh eval.
  - id: settings-return-state-refresh-11-rn-perm-expo-notifications-settings-return-refresh
    description: Must re-check permission state after returning from system settings before resuming permission-dependent actions for the 11-rn-perm-expo-notifications-settings-return-refresh eval.
  - id: implementation-use-expo-permission-apis-11-rn-perm-expo-notifications-settings-return-refresh
    description: Must implement permission handling using Expo permission APIs for the 11-rn-perm-expo-notifications-settings-return-refresh eval.
