version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: camera-permission-before-launchcamera
    description: Must check or request camera permission before launchCameraAsync usage.
  - id: camera-unavailable-fallback-to-library
    description: Must handle camera-unavailable path with a deterministic fallback to launchImageLibraryAsync or equivalent alternate path.
  - id: launchcamera-error-branching
    description: Must branch explicit error or cancellation outcomes from launchCameraAsync.
  - id: no-hard-failure-on-unsupported-device
    description: Must avoid hard-failure behavior on simulator or unsupported camera environments.
  - id: implementation-expo-imagepicker-permission-before-launch
    description: Must check or request expo-image-picker camera/media permissions before launching corresponding picker/camera flows.
  - id: implementation-expo-imagepicker-no-mediatypeoptions
    description: Must avoid deprecated MediaTypeOptions usage and use current mediaTypes array values (MediaType strings) in picker options.
