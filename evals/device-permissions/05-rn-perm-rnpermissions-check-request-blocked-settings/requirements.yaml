version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: rnpermissions-check-request-separation
    description: Must separate permission check and request flows rather than relying on request-only control.
  - id: rnpermissions-explicit-status-map
    description: Must model permission statuses with explicit handling for unavailable, denied, blocked, and granted states.
  - id: blocked-settings-recovery
    description: Must route blocked outcomes to a settings recovery action using openSettings or equivalent.
  - id: android-check-blocked-caveat-aware
    description: Must avoid assuming Android check calls alone can determine blocked status for every permission type.
  - id: permission-capability-state-separation-05-rn-perm-rnpermissions-check-request-blocked-settings
    description: Must model permission status separately from feature capability and action outcome so granted permission is not treated as automatic operation success for the 05-rn-perm-rnpermissions-check-request-blocked-settings eval.
  - id: settings-return-state-refresh-05-rn-perm-rnpermissions-check-request-blocked-settings
    description: Must re-check permission state after returning from system settings before resuming permission-dependent actions for the 05-rn-perm-rnpermissions-check-request-blocked-settings eval.
  - id: implementation-use-react-native-permissions-05-rn-perm-rnpermissions-check-request-blocked-settings
    description: Must implement permission handling using react-native-permissions APIs for the 05-rn-perm-rnpermissions-check-request-blocked-settings eval.
