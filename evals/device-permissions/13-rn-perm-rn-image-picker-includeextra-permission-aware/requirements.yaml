version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: includeextra-enabled-path
    description: Must configure an includeExtra-enabled picker path.
  - id: extra-metadata-optional-safe-handling
    description: Must tolerate missing optional metadata fields without breaking the user flow.
  - id: permission-aware-extra-usage
    description: Must avoid assuming extra metadata availability without permission-aware handling.
  - id: fallback-to-core-asset-fields
    description: Must fall back to core asset fields when extra metadata is unavailable.
  - id: permission-capability-state-separation
    description: Must model permission status separately from feature capability and action outcome so granted permission is not treated as automatic operation success.
  - id: media-result-validation-contract
    description: Must validate media picker or camera results before success state transitions and keep cancellation/error outcomes explicit.
  - id: implementation-use-react-native-image-picker-permissions
    description: Must implement media permission-aware behavior using react-native-image-picker APIs.
