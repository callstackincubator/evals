version: 1
inputs:
  files:
    - app/App.tsx
requirements:
  - id: ios-notification-status-branching
    description: Must inspect iOS notification status details and branch on provisional versus full authorization.
  - id: provisional-usable-degraded-path
    description: Must treat provisional authorization as a usable but degraded permission state.
  - id: denied-and-not-determined-separation
    description: Must separate denied and not-determined notification states with distinct actions.
  - id: ios-permission-options-explicit
    description: Must call requestPermissionsAsync with explicit iOS options or equivalent granularity.
  - id: implementation-expo-notifications-permission-flow
    description: Must use expo-notifications getPermissionsAsync/requestPermissionsAsync flow and branch on explicit permission status outcomes.
  - id: implementation-expo-notifications-ios-provisional-contract
    description: Must branch on iOS granular permission fields (for example ios.status/provisional) and treat provisional as usable degraded state instead of full-grant equivalence.
