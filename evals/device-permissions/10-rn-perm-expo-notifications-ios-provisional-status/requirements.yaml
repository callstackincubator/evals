version: 1
inputs:
  files:
    - prompt.md
    - requirements.yaml
requirements:
  - id: ios-notification-status-branching
    description: Must inspect iOS notification status details and branch on provisional versus full authorization.
  - id: provisional-usable-degraded-path
    description: Must treat provisional authorization as a usable but degraded permission state.
  - id: denied-and-not-determined-separation
    description: Must separate denied and not-determined notification states with distinct actions.
  - id: ios-permission-options-explicit
    description: Must call requestPermissionsAsync with explicit iOS options or equivalent granularity.
  - id: permission-capability-state-separation
    description: Must model permission status separately from feature capability and action outcome so granted permission is not treated as automatic operation success.
  - id: notification-registration-precondition-order
    description: Must gate notification registration and token/channel setup behind explicit granted-permission and capability checks in correct order.
  - id: implementation-use-expo-permission-apis
    description: Must implement permission handling using Expo permission APIs.
